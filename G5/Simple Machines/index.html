<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Machines: CBSE Class 5</title>
    <style>
        :root {
            --primary: #4f46e5;
            --success: #16a34a;
            --bg: #f3f4f6;
        }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #e0f2fe;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            padding: 20px;
        }
        h1 { color: #1e3a8a; margin-bottom: 10px; }
        .game-info { margin-bottom: 20px; font-weight: bold; }

        /* DRAGGABLE ITEMS */
        #item-bank {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
            padding: 20px;
            background: white;
            border-radius: 15px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 800px;
            min-height: 100px;
        }
        .drag-item {
            padding: 10px 15px;
            background: #dbeafe;
            border: 2px solid #3b82f6;
            border-radius: 8px;
            cursor: grab;
            font-weight: 600;
            user-select: none;
        }

        /* DROP ZONES */
        #drop-zones {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            width: 100%;
            max-width: 900px;
            margin-top: 30px;
        }
        .zone {
            background: white;
            border: 3px dashed #94a3b8;
            border-radius: 12px;
            padding: 15px;
            min-height: 120px;
            text-align: center;
            transition: 0.3s;
        }
        .zone.hover { border-color: var(--primary); background: #f1f5f9; }
        .zone h3 { margin: 0 0 10px 0; color: #334155; font-size: 1.1rem; }
        .zone .placed-item {
            background: #f0fdf4;
            border: 1px solid #22c55e;
            margin: 5px 0;
            padding: 5px;
            border-radius: 5px;
            font-size: 0.9rem;
        }

        #overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.8);
            color: white;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }
        .btn {
            padding: 12px 30px;
            background: var(--success);
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-size: 1.1rem;
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <h1>⚙️ Simple Machine Match-Up</h1>
    <div class="game-info">Score: <span id="score">0</span> / 12</div>

    <div id="item-bank">
        <!-- Items will be generated here -->
    </div>

    <div id="drop-zones">
        <div class="zone" data-type="lever"><h3>Lever</h3></div>
        <div class="zone" data-type="pulley"><h3>Pulley</h3></div>
        <div class="zone" data-type="inclined plane"><h3>Inclined Plane</h3></div>
        <div class="zone" data-type="wheel and axle"><h3>Wheel & Axle</h3></div>
        <div class="zone" data-type="wedge"><h3>Wedge</h3></div>
        <div class="zone" data-type="screw"><h3>Screw</h3></div>
    </div>

    <div id="overlay">
        <h1>Great Work, Engineer! 🛠️</h1>
        <p id="final-score"></p>
        <button class="btn" onclick="location.reload()">Play Again</button>
    </div>

<script>
    // CBSE Grade 5 Alignment: Standard examples found in textbooks
    const items = [
        { name: "✂️ Scissors", type: "lever" },
        { name: "⚖️ See-saw", type: "lever" },
        { name: "🚩 Flagpole", type: "pulley" },
        { name: "🏗️ Crane", type: "pulley" },
        { name: "♿ Wheelchair Ramp", type: "inclined plane" },
        { name: "🛝 Playground Slide", type: "inclined plane" },
        { name: "🛞 Doorknob", type: "wheel and axle" },
        { name: "🚲 Bicycle Wheel", type: "wheel and axle" },
        { name: "🪓 Axe", type: "wedge" },
        { name: "🔪 Knife", type: "wedge" },
        { name: "🏺 Jar Lid", type: "screw" },
        { name: "🔩 Metal Screw", type: "screw" }
    ];

    let score = 0;
    const bank = document.getElementById('item-bank');
    const zones = document.querySelectorAll('.zone');

    // Initialize Game
    function init() {
        // Shuffle items
        const shuffled = [...items].sort(() => Math.random() - 0.5);
        shuffled.forEach(item => {
            const div = document.createElement('div');
            div.className = 'drag-item';
            div.innerText = item.name;
            div.draggable = true;
            div.dataset.type = item.type;
            
            div.addEventListener('dragstart', e => {
                e.dataTransfer.setData('text/plain', JSON.stringify(item));
                div.classList.add('dragging');
            });
            
            div.addEventListener('dragend', () => div.classList.remove('dragging'));
            bank.appendChild(div);
        });
    }

    // Drag and Drop Logic
    zones.forEach(zone => {
        zone.addEventListener('dragover', e => {
            e.preventDefault();
            zone.classList.add('hover');
        });

        zone.addEventListener('dragleave', () => zone.classList.remove('hover'));

        zone.addEventListener('drop', e => {
            e.preventDefault();
            zone.classList.remove('hover');
            const data = JSON.parse(e.dataTransfer.getData('text/plain'));
            
            // Check if correct
            if (data.type === zone.dataset.type) {
                score++;
                document.getElementById('score').innerText = score;
                
                // Remove item from bank
                const originalItems = document.querySelectorAll('.drag-item');
                originalItems.forEach(el => {
                    if(el.innerText === data.name) el.remove();
                });

                // Add to zone
                const placed = document.createElement('div');
                placed.className = 'placed-item';
                placed.innerText = data.name;
                zone.appendChild(placed);

                if (score === items.length) {
                    document.getElementById('overlay').style.display = 'flex';
                    document.getElementById('final-score').innerText = `You correctly identified all 12 machines!`;
                }
            } else {
                alert("Try again! Think about how this tool makes work easier.");
            }
        });
    });

    init();
</script>
</body>
</html>
