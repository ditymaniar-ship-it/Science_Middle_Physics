<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Machines Match-Up</title>
    <style>
        :root {
            --primary: #4f46e5;
            --success: #16a34a;
            --danger: #ef4444;
            --sky: #e0f2fe;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: #f8fafc;
            margin: 0;
            padding: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        h1 { color: #1e3a8a; font-size: 1.2rem; margin: 10px 0; text-align: center; }
        
        .stats {
            background: white;
            padding: 8px 20px;
            border-radius: 20px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            margin-bottom: 10px;
            font-weight: bold;
        }

        #item-bank {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 8px;
            background: var(--sky);
            padding: 15px;
            border-radius: 12px;
            width: 90%;
            max-width: 600px;
            min-height: 60px;
            margin-bottom: 15px;
            border: 2px dashed #7dd3fc;
        }

        .drag-item {
            background: white;
            border: 2px solid #38bdf8;
            padding: 8px 12px;
            border-radius: 8px;
            cursor: grab;
            font-size: 0.9rem;
            font-weight: 600;
            user-select: none;
            transition: transform 0.1s;
        }

        /* Visual cue for laptop dragging */
        .drag-item:active { cursor: grabbing; }
        
        /* Visual cue for mobile selection */
        .drag-item.selected {
            background: #fef08a;
            border-color: #ca8a04;
            transform: scale(1.1);
        }

        #drop-zones {
            display: grid;
            width: 100%;
            max-width: 650px;
            gap: 10px;
            grid-template-columns: repeat(2, 1fr);
        }

        @media (min-width: 600px) {
            #drop-zones { grid-template-columns: repeat(3, 1fr); }
        }

        .zone {
            background: white;
            border: 2px solid #cbd5e1;
            border-radius: 12px;
            min-height: 100px;
            padding: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: all 0.2s;
        }

        .zone.hover { background: #eef2ff; border-color: var(--primary); }
        .zone.wrong { animation: shake 0.4s; border-color: var(--danger); }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        .zone h3 {
            margin: 0 0 8px 0;
            font-size: 0.75rem;
            color: #475569;
            text-transform: uppercase;
            pointer-events: none;
        }

        .placed-item {
            background: #dcfce7;
            border: 1px solid #22c55e;
            color: #166534;
            width: 95%;
            padding: 4px;
            margin: 2px 0;
            border-radius: 5px;
            font-size: 0.8rem;
            text-align: center;
        }

        #overlay {
            position: fixed;
            inset: 0;
            background: rgba(15, 23, 42, 0.9);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            z-index: 2000;
        }

        .restart-btn {
            background: var(--success);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 25px;
            cursor: pointer;
            margin-top: 15px;
        }
    </style>
</head>
<body>

    <h1>⚙️ Simple Machine Match-Up</h1>
    <div class="stats">Solved: <span id="score">0</span> / 10</div>

    <div id="item-bank"></div>

    <div id="drop-zones">
        <div class="zone" data-type="lever"><h3>Lever</h3></div>
        <div class="zone" data-type="pulley"><h3>Pulley</h3></div>
        <div class="zone" data-type="inclined plane"><h3>Inclined Plane</h3></div>
        <div class="zone" data-type="wheel and axle"><h3>Wheel & Axle</h3></div>
        <div class="zone" data-type="wedge"><h3>Wedge</h3></div>
        <div class="zone" data-type="screw"><h3>Screw</h3></div>
    </div>

    <div id="overlay">
        <h2>Great Job! 🏆</h2>
        <button class="restart-btn" onclick="startGame()">Play Again</button>
    </div>

    <script>
        const items = [
            { name: "✂️ Scissors", type: "lever" }, { name: "⚖️ See-saw", type: "lever" }, { name: "🔨 Hammer", type: "lever" },
            { name: "🚩 Flagpole", type: "pulley" }, { name: "🏗️ Crane", type: "pulley" }, { name: "🪣 Well Bucket", type: "pulley" },
            { name: "♿ Ramp", type: "inclined plane" }, { name: "🛝 Slide", type: "inclined plane" }, { name: "🪜 Ladder", type: "inclined plane" },
            { name: "🛞 Doorknob", type: "wheel and axle" }, { name: "🚲 Pedal", type: "wheel and axle" }, { name: "🎡 Ferris Wheel", type: "wheel and axle" },
            { name: "🪓 Axe", type: "wedge" }, { name: "🔪 Knife", type: "wedge" }, { name: "🚪 Door Stopper", type: "wedge" },
            { name: "🏺 Jar Lid", type: "screw" }, { name: "🔩 Bolt", type: "screw" }, { name: "💡 Bulb Base", type: "screw" }
        ];

        let score = 0;
        let selectedEl = null;

        function startGame() {
            score = 0;
            selectedEl = null;
            document.getElementById('score').innerText = "0";
            document.getElementById('overlay').style.display = "none";
            document.querySelectorAll('.zone').forEach(z => {
                const h3 = z.querySelector('h3');
                z.innerHTML = ''; z.appendChild(h3);
            });

            const bank = document.getElementById('item-bank');
            bank.innerHTML = '';
            const picked = [...items].sort(() => 0.5 - Math.random()).slice(0, 10);

            picked.forEach(item => {
                const div = document.createElement('div');
                div.className = 'drag-item';
                div.innerText = item.name;
                div.draggable = true;
                div.dataset.type = item.type;

                // Laptop: Drag Start
                div.addEventListener('dragstart', (e) => {
                    selectedEl = div;
                    e.dataTransfer.setData('text/plain', item.type);
                });

                // Mobile/Tablet: Tap to Select
                div.addEventListener('click', () => {
                    document.querySelectorAll('.drag-item').forEach(i => i.classList.remove('selected'));
                    selectedEl = div;
                    div.classList.add('selected');
                });

                bank.appendChild(div);
            });
        }

        document.querySelectorAll('.zone').forEach(zone => {
            // Laptop: Drag Over/Drop
            zone.addEventListener('dragover', (e) => e.preventDefault());
            zone.addEventListener('dragenter', () => zone.classList.add('hover'));
            zone.addEventListener('dragleave', () => zone.classList.remove('hover'));

            zone.addEventListener('drop', (e) => {
                e.preventDefault();
                zone.classList.remove('hover');
                checkMatch(zone);
            });

            // Mobile/Tablet: Tap the Zone
            zone.addEventListener('click', () => {
                if (selectedEl) checkMatch(zone);
            });
        });

        function checkMatch(zone) {
            if (!selectedEl) return;

            if (selectedEl.dataset.type === zone.dataset.type) {
                // SUCCESS
                score++;
                document.getElementById('score').innerText = score;
                
                const newItem = document.createElement('div');
                newItem.className = 'placed-item';
                newItem.innerText = selectedEl.innerText;
                zone.appendChild(newItem);

                selectedEl.remove(); // Item disappears from bank
                selectedEl = null;

                if (score === 10) {
                    setTimeout(() => document.getElementById('overlay').style.display = 'flex', 300);
                }
            } else {
                // WRONG
                zone.classList.add('wrong');
                setTimeout(() => zone.classList.remove('wrong'), 400);
            }
        }

        window.onload = startGame;
    </script>
</body>
</html>
