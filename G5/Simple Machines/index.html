<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Simple Machines 3x3 Matrix</title>
    <style>
        :root {
            --primary: #4f46e5;
            --success: #16a34a;
            --danger: #ef4444;
            --sky: #e0f2fe;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: #f8fafc;
            margin: 0;
            padding: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            touch-action: manipulation;
        }

        h1 { color: #1e3a8a; font-size: 1.3rem; margin: 10px 0; text-align: center; }
        
        .stats {
            background: white;
            padding: 8px 20px;
            border-radius: 20px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            margin-bottom: 10px;
            font-weight: bold;
            font-size: 0.9rem;
        }

        #item-bank {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 6px;
            background: var(--sky);
            padding: 12px;
            border-radius: 12px;
            width: 90%;
            max-width: 600px;
            min-height: 50px;
            margin-bottom: 15px;
            border: 2px dashed #7dd3fc;
        }

        .drag-item {
            background: white;
            border: 2px solid #38bdf8;
            padding: 6px 10px;
            border-radius: 8px;
            cursor: grab;
            font-size: 0.85rem;
            font-weight: 600;
            user-select: none;
            touch-action: none;
            position: relative;
            z-index: 10;
        }

        /* 2 columns on mobile, 3 on larger screens */
        #drop-zones {
            display: grid;
            width: 95%;
            max-width: 800px;
            gap: 10px;
            grid-template-columns: repeat(2, 1fr);
        }

        @media (min-width: 768px) {
            #drop-zones { grid-template-columns: repeat(3, 1fr); }
        }

        .zone {
            background: white;
            border: 2px solid #cbd5e1;
            border-radius: 12px;
            min-height: 100px;
            padding: 8px;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: all 0.2s;
        }

        .zone.hover {
            border-color: var(--primary);
            background: #eef2ff;
            transform: scale(1.02);
        }

        .zone.wrong {
            border-color: var(--danger);
            background: #fee2e2;
        }

        .zone h3 {
            margin: 0 0 8px 0;
            font-size: 0.8rem;
            color: #475569;
            text-transform: uppercase;
        }

        .placed-item {
            background: #dcfce7;
            border: 1px solid #22c55e;
            color: #166534;
            width: 90%;
            padding: 4px;
            margin: 2px 0;
            border-radius: 5px;
            font-size: 0.75rem;
            text-align: center;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } }

        #overlay {
            position: fixed;
            inset: 0;
            background: rgba(15, 23, 42, 0.95);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            z-index: 100;
            text-align: center;
            padding: 20px;
        }

        .restart-btn {
            background: var(--success);
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 1.1rem;
            border-radius: 25px;
            cursor: pointer;
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <h1>⚙️ Simple Machine Match-Up</h1>
    
    <div class="stats">Solved: <span id="score">0</span> / 10</div>

    <div id="item-bank"></div>

    <div id="drop-zones">
        <div class="zone" data-type="lever"><h3>Lever</h3></div>
        <div class="zone" data-type="pulley"><h3>Pulley</h3></div>
        <div class="zone" data-type="inclined plane"><h3>Inclined Plane</h3></div>
        <div class="zone" data-type="wheel and axle"><h3>Wheel & Axle</h3></div>
        <div class="zone" data-type="wedge"><h3>Wedge</h3></div>
        <div class="zone" data-type="screw"><h3>Screw</h3></div>
    </div>

    <div id="overlay">
        <h2>Great Job, Engineer! 🏆</h2>
        <p>You categorized all machines correctly.</p>
        <button class="restart-btn" onclick="startGame()">Play Again</button>
    </div>

    <script>
        const masterBank = [
            { name: "✂️ Scissors", type: "lever" },
            { name: "⚖️ See-saw", type: "lever" },
            { name: "🔨 Hammer", type: "lever" },
            { name: "🚩 Flagpole", type: "pulley" },
            { name: "🏗️ Crane", type: "pulley" },
            { name: "🪣 Well Bucket", type: "pulley" },
            { name: "♿ Ramp", type: "inclined plane" },
            { name: "🛝 Slide", type: "inclined plane" },
            { name: "🪜 Ladder", type: "inclined plane" },
            { name: "🛞 Doorknob", type: "wheel and axle" },
            { name: "🚲 Pedal", type: "wheel and axle" },
            { name: "🎡 Ferris Wheel", type: "wheel and axle" },
            { name: "🪓 Axe", type: "wedge" },
            { name: "🔪 Knife", type: "wedge" },
            { name: "🚪 Door Stopper", type: "wedge" },
            { name: "🏺 Jar Lid", type: "screw" },
            { name: "🔩 Bolt", type: "screw" },
            { name: "💡 Bulb Base", type: "screw" }
        ];

        let score = 0;
        const totalToWin = 10;
        let activeTouchItem = null;

        function startGame() {
            score = 0;
            document.getElementById('score').innerText = "0";
            document.getElementById('overlay').style.display = "none";
            
            document.querySelectorAll('.zone').forEach(z => {
                const title = z.querySelector('h3');
                z.innerHTML = '';
                z.appendChild(title);
            });

            const bankEl = document.getElementById('item-bank');
            bankEl.innerHTML = '';
            const picked = [...masterBank].sort(() => 0.5 - Math.random()).slice(0, totalToWin);

            picked.forEach(item => {
                const div = document.createElement('div');
                div.className = 'drag-item';
                div.innerText = item.name;
                div.draggable = true;
                div.dataset.itemData = JSON.stringify(item);

                // Desktop Drag
                div.addEventListener('dragstart', (e) => {
                    e.dataTransfer.setData('text/plain', div.dataset.itemData);
                    div.classList.add('dragging');
                });

                // Touch support
                div.addEventListener('touchstart', handleTouchStart, {passive: false});
                div.addEventListener('touchmove', handleTouchMove, {passive: false});
                div.addEventListener('touchend', handleTouchEnd, {passive: false});

                bankEl.appendChild(div);
            });
        }

        // --- Touch Logic ---
        function handleTouchStart(e) {
            activeTouchItem = e.target;
            activeTouchItem.style.position = 'fixed';
            activeTouchItem.style.zIndex = '1000';
            moveAt(e.touches[0].pageX, e.touches[0].pageY);
        }

        function handleTouchMove(e) {
            e.preventDefault();
            moveAt(e.touches[0].pageX, e.touches[0].pageY);
            
            const targetZone = getZoneUnderPoint(e.touches[0].clientX, e.touches[0].clientY);
            document.querySelectorAll('.zone').forEach(z => z.classList.remove('hover'));
            if (targetZone) targetZone.classList.add('hover');
        }

        function handleTouchEnd(e) {
            const touch = e.changedTouches[0];
            const targetZone = getZoneUnderPoint(touch.clientX, touch.clientY);
            const itemData = JSON.parse(activeTouchItem.dataset.itemData);

            if (targetZone && itemData.type === targetZone.dataset.type) {
                processCorrectDrop(targetZone, itemData, activeTouchItem);
            } else {
                if (targetZone) {
                    targetZone.classList.add('wrong');
                    setTimeout(() => targetZone.classList.remove('wrong'), 500);
                }
                activeTouchItem.style.position = 'static';
            }
            
            document.querySelectorAll('.zone').forEach(z => z.classList.remove('hover'));
            activeTouchItem = null;
        }

        function moveAt(pageX, pageY) {
            if (!activeTouchItem) return;
            activeTouchItem.style.left = pageX - activeTouchItem.offsetWidth / 2 + 'px';
            activeTouchItem.style.top = pageY - activeTouchItem.offsetHeight / 2 + 'px';
        }

        function getZoneUnderPoint(x, y) {
            const el = document.elementFromPoint(x, y);
            return el ? el.closest('.zone') : null;
        }

        // --- Shared Drop Logic ---
        function processCorrectDrop(zone, itemData, originalEl) {
            score++;
            document.getElementById('score').innerText = score;
            
            // Immediately disappear from options
            if (originalEl) originalEl.remove();

            const newItem = document.createElement('div');
            newItem.className = 'placed-item';
            newItem.innerText = itemData.name;
            zone.appendChild(newItem);

            if (score === totalToWin) {
                setTimeout(() => {
                    document.getElementById('overlay').style.display = "flex";
                }, 500);
            }
        }

        // --- Desktop Drop Events ---
        document.querySelectorAll('.zone').forEach(zone => {
            zone.addEventListener('dragover', e => e.preventDefault());
            zone.addEventListener('dragenter', () => zone.classList.add('hover'));
            zone.addEventListener('dragleave', () => zone.classList.remove('hover'));

            zone.addEventListener('drop', e => {
                e.preventDefault();
                zone.classList.remove('hover');
                const itemData = JSON.parse(e.dataTransfer.getData('text/plain'));
                
                if (itemData.type === zone.dataset.type) {
                    // Find the matching element in the bank and remove it
                    const bankItems = document.querySelectorAll('.drag-item');
                    let originalEl = Array.from(bankItems).find(el => el.innerText === itemData.name);
                    processCorrectDrop(zone, itemData, originalEl);
                } else {
                    zone.classList.add('wrong');
                    setTimeout(() => zone.classList.remove('wrong'), 500);
                }
            });
        });

        window.onload = startGame;
    </script>
</body>
</html>
