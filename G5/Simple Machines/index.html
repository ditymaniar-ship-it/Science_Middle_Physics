<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Simple Machines Match-Up</title>
    <style>
        :root {
            --primary: #4f46e5;
            --success: #16a34a;
            --danger: #ef4444;
            --sky: #e0f2fe;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: #f8fafc;
            margin: 0;
            padding: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
            touch-action: none; /* Crucial for mobile dragging */
        }

        h1 { color: #1e3a8a; font-size: 1.2rem; margin: 10px 0; text-align: center; }
        
        .stats {
            background: white;
            padding: 8px 20px;
            border-radius: 20px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            margin-bottom: 10px;
            font-weight: bold;
        }

        #item-bank {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 8px;
            background: var(--sky);
            padding: 15px;
            border-radius: 12px;
            width: 90%;
            max-width: 600px;
            min-height: 60px;
            margin-bottom: 15px;
            border: 2px dashed #7dd3fc;
            position: relative;
        }

        .drag-item {
            background: white;
            border: 2px solid #38bdf8;
            padding: 8px 12px;
            border-radius: 8px;
            cursor: grab;
            font-size: 0.9rem;
            font-weight: 600;
            user-select: none;
            touch-action: none;
            z-index: 100;
        }

        .drag-item.dragging {
            opacity: 0.5;
        }

        #drop-zones {
            display: grid;
            width: 100%;
            max-width: 600px;
            gap: 10px;
            grid-template-columns: repeat(2, 1fr);
        }

        @media (min-width: 768px) {
            #drop-zones { grid-template-columns: repeat(3, 1fr); }
        }

        .zone {
            background: white;
            border: 2px solid #cbd5e1;
            border-radius: 12px;
            min-height: 110px;
            padding: 8px;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: all 0.2s;
            pointer-events: auto;
        }

        .zone.hover { background: #e0e7ff; border-color: var(--primary); transform: scale(1.02); }
        .zone.wrong { background: #fee2e2; border-color: var(--danger); }

        .zone h3 {
            margin: 0 0 8px 0;
            font-size: 0.8rem;
            color: #475569;
            text-transform: uppercase;
            pointer-events: none; /* Prevents interference during drag */
        }

        .placed-item {
            background: #dcfce7;
            border: 1px solid #22c55e;
            color: #166534;
            width: 90%;
            padding: 5px;
            margin: 2px 0;
            border-radius: 5px;
            font-size: 0.8rem;
            text-align: center;
            animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes popIn { from { transform: scale(0); } to { transform: scale(1); } }

        #overlay {
            position: fixed;
            inset: 0;
            background: rgba(15, 23, 42, 0.9);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            z-index: 2000;
        }

        .restart-btn {
            background: var(--success);
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 1.1rem;
            border-radius: 25px;
            cursor: pointer;
            margin-top: 15px;
        }
    </style>
</head>
<body>

    <h1>⚙️ Simple Machine Match-Up</h1>
    <div class="stats">Solved: <span id="score">0</span> / 10</div>

    <div id="item-bank"></div>

    <div id="drop-zones">
        <div class="zone" data-type="lever"><h3>Lever</h3></div>
        <div class="zone" data-type="pulley"><h3>Pulley</h3></div>
        <div class="zone" data-type="inclined plane"><h3>Inclined Plane</h3></div>
        <div class="zone" data-type="wheel and axle"><h3>Wheel & Axle</h3></div>
        <div class="zone" data-type="wedge"><h3>Wedge</h3></div>
        <div class="zone" data-type="screw"><h3>Screw</h3></div>
    </div>

    <div id="overlay">
        <h2>Great Job, Engineer! 🏆</h2>
        <button class="restart-btn" onclick="startGame()">Play Again</button>
    </div>

    <script>
        const masterBank = [
            { name: "✂️ Scissors", type: "lever" }, { name: "⚖️ See-saw", type: "lever" }, { name: "🔨 Hammer", type: "lever" },
            { name: "🚩 Flagpole", type: "pulley" }, { name: "🏗️ Crane", type: "pulley" }, { name: "🪣 Well Bucket", type: "pulley" },
            { name: "♿ Ramp", type: "inclined plane" }, { name: "🛝 Slide", type: "inclined plane" }, { name: "🪜 Ladder", type: "inclined plane" },
            { name: "🛞 Doorknob", type: "wheel and axle" }, { name: "🚲 Pedal", type: "wheel and axle" }, { name: "🎡 Ferris Wheel", type: "wheel and axle" },
            { name: "🪓 Axe", type: "wedge" }, { name: "🔪 Knife", type: "wedge" }, { name: "🚪 Door Stopper", type: "wedge" },
            { name: "🏺 Jar Lid", type: "screw" }, { name: "🔩 Bolt", type: "screw" }, { name: "💡 Bulb Base", type: "screw" }
        ];

        let score = 0;
        const totalToWin = 10;
        let activeElement = null;

        function startGame() {
            score = 0;
            document.getElementById('score').innerText = "0";
            document.getElementById('overlay').style.display = "none";
            document.querySelectorAll('.zone').forEach(z => {
                const title = z.querySelector('h3');
                z.innerHTML = '';
                z.appendChild(title);
            });

            const bank = document.getElementById('item-bank');
            bank.innerHTML = '';
            const picked = [...masterBank].sort(() => 0.5 - Math.random()).slice(0, totalToWin);

            picked.forEach(item => {
                const div = document.createElement('div');
                div.className = 'drag-item';
                div.innerText = item.name;
                div.dataset.type = item.type;
                div.draggable = true;

                // Desktop Mouse Events
                div.addEventListener('dragstart', (e) => {
                    activeElement = div;
                    e.dataTransfer.setData('text/plain', JSON.stringify(item));
                    setTimeout(() => div.classList.add('dragging'), 0);
                });
                div.addEventListener('dragend', () => div.classList.remove('dragging'));

                // Mobile Touch Events
                div.addEventListener('touchstart', handleTouchStart, {passive: false});
                div.addEventListener('touchmove', handleTouchMove, {passive: false});
                div.addEventListener('touchend', handleTouchEnd);

                bank.appendChild(div);
            });
        }

        // --- UNIFIED SUCCESS LOGIC ---
        function handleCorrectDrop(zone, itemName) {
            score++;
            document.getElementById('score').innerText = score;
            
            const newItem = document.createElement('div');
            newItem.className = 'placed-item';
            newItem.innerText = itemName;
            zone.appendChild(newItem);

            if (activeElement) activeElement.remove();
            
            if (score === totalToWin) {
                setTimeout(() => document.getElementById('overlay').style.display = 'flex', 300);
            }
        }

        // --- DESKTOP DROP LOGIC ---
        document.querySelectorAll('.zone').forEach(zone => {
            zone.addEventListener('dragover', (e) => e.preventDefault());
            zone.addEventListener('dragenter', () => zone.classList.add('hover'));
            zone.addEventListener('dragleave', () => zone.classList.remove('hover'));
            zone.addEventListener('drop', (e) => {
                e.preventDefault();
                zone.classList.remove('hover');
                const data = JSON.parse(e.dataTransfer.getData('text/plain'));
                if (data.type === zone.dataset.type) {
                    handleCorrectDrop(zone, data.name);
                } else {
                    zone.classList.add('wrong');
                    setTimeout(() => zone.classList.remove('wrong'), 400);
                }
            });
        });

        // --- MOBILE TOUCH LOGIC ---
        function handleTouchStart(e) {
            activeElement = e.target;
            activeElement.style.position = 'fixed';
            activeElement.style.width = activeElement.offsetWidth + 'px';
            updateTouchPos(e.touches[0].clientX, e.touches[0].clientY);
        }

        function handleTouchMove(e) {
            e.preventDefault();
            const touch = e.touches[0];
            updateTouchPos(touch.clientX, touch.clientY);

            const zone = getZoneUnderPoint(touch.clientX, touch.clientY);
            document.querySelectorAll('.zone').forEach(z => z.classList.remove('hover'));
            if (zone) zone.classList.add('hover');
        }

        function handleTouchEnd(e) {
            const touch = e.changedTouches[0];
            const zone = getZoneUnderPoint(touch.clientX, touch.clientY);
            const type = activeElement.dataset.type;
            const name = activeElement.innerText;

            if (zone && zone.dataset.type === type) {
                handleCorrectDrop(zone, name);
            } else {
                if (zone) {
                    zone.classList.add('wrong');
                    setTimeout(() => zone.classList.remove('wrong'), 400);
                }
                activeElement.style.position = 'static';
                activeElement.style.width = 'auto';
            }
            document.querySelectorAll('.zone').forEach(z => z.classList.remove('hover'));
            activeElement = null;
        }

        function updateTouchPos(x, y) {
            activeElement.style.left = (x - activeElement.offsetWidth / 2) + 'px';
            activeElement.style.top = (y - activeElement.offsetHeight / 2) + 'px';
        }

        function getZoneUnderPoint(x, y) {
            const el = document.elementFromPoint(x, y);
            return el ? el.closest('.zone') : null;
        }

        window.onload = startGame;
    </script>
</body>
</html>
