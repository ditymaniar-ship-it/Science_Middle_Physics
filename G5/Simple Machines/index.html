<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Measurement Master: Grade 5 Science</title>
    <style>
        :root {
            --primary: #1e3a8a;
            --secondary: #3b82f6;
            --success: #22c55e;
            --danger: #ef4444;
            --bg: #f0f9ff;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* HEADER & STATS */
        #game-header {
            width: 100%;
            background: var(--primary);
            color: white;
            padding: 15px;
            text-align: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        #stats-bar {
            display: flex;
            justify-content: space-around;
            width: 100%;
            max-width: 600px;
            margin: 15px 0;
            font-weight: bold;
            color: var(--primary);
        }

        /* GAME CARD */
        #game-container {
            background: white;
            width: 90%;
            max-width: 600px;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
        }

        .question-text {
            font-size: 1.3rem;
            margin-bottom: 25px;
            color: #1f2937;
        }

        /* OPTIONS */
        .options-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 12px;
        }

        .option-btn {
            padding: 15px;
            border: 2px solid #e5e7eb;
            border-radius: 12px;
            background: white;
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.2s;
            font-weight: 500;
        }

        .option-btn:hover {
            border-color: var(--secondary);
            background: #eff6ff;
        }

        .option-btn.correct { background: #dcfce7; border-color: var(--success); }
        .option-btn.wrong { background: #fee2e2; border-color: var(--danger); }

        /* OVERLAY */
        #overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.85);
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            z-index: 100;
        }

        .btn-restart {
            padding: 15px 40px;
            background: var(--success);
            color: white;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            font-size: 1.2rem;
            margin-top: 20px;
        }
    </style>
</head>
<body>

<div id="game-header">
    <h1>📏 Measurement Master Challenge</h1>
</div>

<div id="stats-bar">
    <span>🏆 Score: <span id="score">0</span></span>
    <span>❤️ Lives: <span id="lives">3</span></span>
</div>

<div id="game-container">
    <div id="quiz-box">
        <p class="question-text" id="q-text">Loading...</p>
        <div class="options-grid" id="options-box"></div>
    </div>
</div>

<div id="overlay">
    <h1 id="result-title">Game Over!</h1>
    <p id="result-msg"></p>
    <button class="btn-restart" onclick="initGame()">Try Again</button>
</div>

<script>
    // Questions based on Birla Open Minds Grade 5 Curriculum [0.1.1 - 0.1.5]
    const questionBank = [
        { q: "Which tool would you use to measure the height of a family member?", o: ["Ruler", "Measuring Tape", "Handspan", "Thermometer"], a: 1 },
        { q: "Which of these is a standard unit of length?", o: ["Handspan", "Footstep", "Centimeter", "Cubit"], a: 2 },
        { q: "How many centimeters are in 1 meter?", o: ["10 cm", "100 cm", "1000 cm", "50 cm"], a: 1 },
        { q: "Which unit is best for measuring the mass of 5 apples?", o: ["Milliliters", "Kilograms", "Kilometers", "Degrees"], a: 1 },
        { q: "1 Liter (L) is equal to how many Milliliters (mL)?", o: ["100 mL", "500 mL", "1000 mL", "10 mL"], a: 2 },
        { q: "Which tool measures the duration of your daily routine?", o: ["Clock", "Beaker", "Weighing Scale", "Measuring Tape"], a: 0 },
        { q: "What tool does a doctor use to measure human body temperature?", o: ["Laboratory Thermometer", "Measuring Cup", "Clinical Thermometer", "Stopwatch"], a: 2 },
        { q: "If you don't have a clock, how can you estimate the time of day?", o: ["Feel the air", "Look at your shadow", "Measure your mass", "Count your footsteps"], a: 1 },
        { q: "What is the correct unit for measuring the capacity of a juice bottle?", o: ["Grams", "Centimeters", "Liters", "Minutes"], a: 2 },
        { q: "Before using a clinical thermometer, what is an important safety step?", o: ["Boil it", "Wash/Sanitize it", "Heat it with a lamp", "Freeze it"], a: 1 }
    ];

    let gameState = {
        score: 0,
        lives: 3,
        currentIdx: 0,
        shuffledQs: []
    };

    function initGame() {
        gameState = {
            score: 0,
            lives: 3,
            currentIdx: 0,
            shuffledQs: [...questionBank].sort(() => Math.random() - 0.5)
        };
        document.getElementById('overlay').style.display = 'none';
        updateUI();
        renderQuestion();
    }

    function renderQuestion() {
        const qData = gameState.shuffledQs[gameState.currentIdx];
        document.getElementById('q-text').innerText = qData.q;
        
        const optionsBox = document.getElementById('options-box');
        optionsBox.innerHTML = '';
        
        qData.o.forEach((opt, idx) => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerText = opt;
            btn.onclick = () => checkAnswer(idx, btn);
            optionsBox.appendChild(btn);
        });
    }

    function checkAnswer(choice, btn) {
        const correctIdx = gameState.shuffledQs[gameState.currentIdx].a;
        const allBtns = document.querySelectorAll('.option-btn');
        allBtns.forEach(b => b.disabled = true);

        if (choice === correctIdx) {
            btn.classList.add('correct');
            gameState.score += 10;
        } else {
            btn.classList.add('wrong');
            allBtns[correctIdx].classList.add('correct');
            gameState.lives--;
        }

        updateUI();

        setTimeout(() => {
            if (gameState.lives <= 0) {
                endGame("Better luck next time!");
            } else if (gameState.currentIdx >= gameState.shuffledQs.length - 1) {
                endGame("You are a Measurement Master!");
            } else {
                gameState.currentIdx++;
                renderQuestion();
            }
        }, 1500);
    }

    function updateUI() {
        document.getElementById('score').innerText = gameState.score;
        document.getElementById('lives').innerText = gameState.lives;
    }

    function endGame(msg) {
        document.getElementById('overlay').style.display = 'flex';
        document.getElementById('result-title').innerText = gameState.lives <= 0 ? "Game Over!" : "Mission Accomplished!";
        document.getElementById('result-msg').innerText = `${msg} Final Score: ${gameState.score}`;
    }

    initGame();
</script>

</body>
</html>
