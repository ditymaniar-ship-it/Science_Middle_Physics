<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Simple Machines Match-Up</title>
    <style>
        :root {
            --primary: #4f46e5;
            --success: #16a34a;
            --danger: #ef4444;
            --sky: #e0f2fe;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: #f8fafc;
            margin: 0;
            padding: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
            touch-action: none; /* Prevents scrolling while dragging */
        }

        h1 { color: #1e3a8a; font-size: 1.2rem; margin: 10px 0; }
        
        .stats {
            background: white;
            padding: 8px 20px;
            border-radius: 20px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            margin-bottom: 10px;
            font-weight: bold;
        }

        #item-bank {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 8px;
            background: var(--sky);
            padding: 15px;
            border-radius: 12px;
            width: 90%;
            min-height: 60px;
            margin-bottom: 15px;
            border: 2px dashed #7dd3fc;
        }

        .drag-item {
            background: white;
            border: 2px solid #38bdf8;
            padding: 8px 12px;
            border-radius: 8px;
            cursor: grab;
            font-size: 0.9rem;
            font-weight: 600;
            user-select: none;
            touch-action: none;
            z-index: 10;
        }

        #drop-zones {
            display: grid;
            width: 100%;
            max-width: 600px;
            gap: 10px;
            grid-template-columns: repeat(2, 1fr);
        }

        .zone {
            background: white;
            border: 2px solid #cbd5e1;
            border-radius: 12px;
            min-height: 110px;
            padding: 8px;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: background 0.2s;
        }

        .zone.hover { background: #e0e7ff; border-color: var(--primary); }
        .zone.wrong { background: #fee2e2; border-color: var(--danger); }

        .zone h3 {
            margin: 0 0 8px 0;
            font-size: 0.8rem;
            color: #475569;
            pointer-events: none;
        }

        .placed-item {
            background: #dcfce7;
            border: 1px solid #22c55e;
            color: #166534;
            width: 90%;
            padding: 5px;
            margin: 2px 0;
            border-radius: 5px;
            font-size: 0.8rem;
            text-align: center;
        }

        #overlay {
            position: fixed;
            inset: 0;
            background: rgba(15, 23, 42, 0.9);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            z-index: 2000;
        }

        .restart-btn {
            background: var(--success);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 25px;
            cursor: pointer;
            margin-top: 15px;
        }
    </style>
</head>
<body>

    <h1>⚙️ Simple Machine Match</h1>
    <div class="stats">Solved: <span id="score">0</span> / 10</div>

    <div id="item-bank"></div>

    <div id="drop-zones">
        <div class="zone" data-type="lever"><h3>Lever</h3></div>
        <div class="zone" data-type="pulley"><h3>Pulley</h3></div>
        <div class="zone" data-type="inclined plane"><h3>Inclined Plane</h3></div>
        <div class="zone" data-type="wheel and axle"><h3>Wheel & Axle</h3></div>
        <div class="zone" data-type="wedge"><h3>Wedge</h3></div>
        <div class="zone" data-type="screw"><h3>Screw</h3></div>
    </div>

    <div id="overlay">
        <h2>Well Done! 🏆</h2>
        <button class="restart-btn" onclick="startGame()">Play Again</button>
    </div>

    <script>
        const masterBank = [
            { name: "✂️ Scissors", type: "lever" }, { name: "⚖️ See-saw", type: "lever" }, { name: "🔨 Hammer", type: "lever" },
            { name: "🚩 Flagpole", type: "pulley" }, { name: "🏗️ Crane", type: "pulley" }, { name: "🪣 Well Bucket", type: "pulley" },
            { name: "♿ Ramp", type: "inclined plane" }, { name: "🛝 Slide", type: "inclined plane" }, { name: "🪜 Ladder", type: "inclined plane" },
            { name: "🛞 Doorknob", type: "wheel and axle" }, { name: "🚲 Pedal", type: "wheel and axle" }, { name: "🎡 Ferris Wheel", type: "wheel and axle" },
            { name: "🪓 Axe", type: "wedge" }, { name: "🔪 Knife", type: "wedge" }, { name: "🚪 Door Stopper", type: "wedge" },
            { name: "🏺 Jar Lid", type: "screw" }, { name: "🔩 Bolt", type: "screw" }, { name: "💡 Bulb Base", type: "screw" }
        ];

        let score = 0;
        const totalToWin = 10;
        let activeElement = null;
        let startX, startY;

        function startGame() {
            score = 0;
            document.getElementById('score').innerText = "0";
            document.getElementById('overlay').style.display = "none";
            document.querySelectorAll('.zone').forEach(z => {
                const title = z.querySelector('h3');
                z.innerHTML = ''; z.appendChild(title);
            });

            const bank = document.getElementById('item-bank');
            bank.innerHTML = '';
            const picked = [...masterBank].sort(() => 0.5 - Math.random()).slice(0, totalToWin);

            picked.forEach(item => {
                const div = document.createElement('div');
                div.className = 'drag-item';
                div.innerText = item.name;
                div.dataset.type = item.type;
                
                // Touch Events
                div.addEventListener('touchstart', touchStart, {passive: false});
                div.addEventListener('touchmove', touchMove, {passive: false});
                div.addEventListener('touchend', touchEnd);
                
                bank.appendChild(div);
            });
        }

        function touchStart(e) {
            activeElement = e.target;
            const touch = e.touches[0];
            startX = touch.clientX - activeElement.offsetLeft;
            startY = touch.clientY - activeElement.offsetTop;
            activeElement.style.position = 'fixed';
            activeElement.style.width = activeElement.offsetWidth + 'px';
        }

        function touchMove(e) {
            if (!activeElement) return;
            e.preventDefault();
            const touch = e.touches[0];
            activeElement.style.left = (touch.clientX - activeElement.offsetWidth / 2) + 'px';
            activeElement.style.top = (touch.clientY - activeElement.offsetHeight / 2) + 'px';

            // Hover effect
            const zone = getZoneUnderPoint(touch.clientX, touch.clientY);
            document.querySelectorAll('.zone').forEach(z => z.classList.remove('hover'));
            if (zone) zone.classList.add('hover');
        }

        function touchEnd(e) {
            if (!activeElement) return;
            const touch = e.changedTouches[0];
            const zone = getZoneUnderPoint(touch.clientX, touch.clientY);
            const itemType = activeElement.dataset.type;
            const itemName = activeElement.innerText;

            if (zone && zone.dataset.type === itemType) {
                // SUCCESS
                score++;
                document.getElementById('score').innerText = score;
                
                const newItem = document.createElement('div');
                newItem.className = 'placed-item';
                newItem.innerText = itemName;
                zone.appendChild(newItem);
                
                activeElement.remove(); // Disappears from bank
                if (score === totalToWin) document.getElementById('overlay').style.display = 'flex';
            } else {
                // FAILURE - Snap back
                if (zone) {
                    zone.classList.add('wrong');
                    setTimeout(() => zone.classList.remove('wrong'), 400);
                }
                activeElement.style.position = 'static';
                activeElement.style.width = 'auto';
            }

            document.querySelectorAll('.zone').forEach(z => z.classList.remove('hover'));
            activeElement = null;
        }

        function getZoneUnderPoint(x, y) {
            const el = document.elementFromPoint(x, y);
            return el ? el.closest('.zone') : null;
        }

        window.onload = startGame;
    </script>
</body>
</html>
