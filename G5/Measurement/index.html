<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Measurement Master: Time Attack!</title>
    <style>
        :root {
            --primary: #1e3a8a; --secondary: #3b82f6;
            --success: #22c55e; --danger: #ef4444; --bg: #0f172a;
        }
        body {
            font-family: 'Segoe UI', sans-serif; background: var(--bg);
            margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; color: white;
        }
        #game-header { width: 100%; background: var(--primary); padding: 10px; text-align: center; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        
        /* TIMER BAR */
        #timer-container { width: 100%; height: 8px; background: #334155; position: relative; }
        #timer-bar { width: 100%; height: 100%; background: var(--success); transition: width 0.1s linear; }

        #stats-bar { display: flex; justify-content: space-around; width: 100%; max-width: 600px; margin: 15px 0; font-weight: bold; font-size: 1.1rem; }
        
        #game-container { background: white; color: #1e293b; width: 90%; max-width: 600px; padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); text-align: center; position: relative; }
        
        .question-text { font-size: 1.2rem; margin-bottom: 20px; font-weight: 600; min-height: 60px; }
        
        .options-grid { display: grid; grid-template-columns: 1fr; gap: 10px; }
        .option-btn { padding: 14px; border: 2px solid #e2e8f0; border-radius: 12px; background: white; cursor: pointer; font-size: 1rem; transition: 0.2s; font-weight: 500; }
        .option-btn:hover:not(:disabled) { border-color: var(--secondary); background: #f8fafc; transform: translateY(-2px); }
        .option-btn.correct { background: #dcfce7 !important; border-color: var(--success) !important; color: #166534; }
        .option-btn.wrong { background: #fee2e2 !important; border-color: var(--danger) !important; color: #991b1b; }
        
        #overlay { display: none; position: fixed; inset: 0; background: rgba(15, 23, 42, 0.95); flex-direction: column; justify-content: center; align-items: center; z-index: 1000; text-align: center; }
        .btn-main { padding: 15px 40px; background: var(--success); color: white; border: none; border-radius: 30px; cursor: pointer; font-size: 1.2rem; margin-top: 25px; font-weight: bold; }
    </style>
</head>
<body>

<div id="game-header"><h1>⏱️ Measurement: Time Attack!</h1></div>
<div id="timer-container"><div id="timer-bar"></div></div>

<div id="stats-bar">
    <span>🏆 Score: <span id="score">0</span></span>
    <span>❤️ Lives: <span id="lives">3</span></span>
    <span>📝 Q: <span id="progress">1</span>/10</span>
</div>

<div id="game-container">
    <p class="question-text" id="q-text">Loading Challenge...</p>
    <div class="options-grid" id="options-box"></div>
</div>

<div id="overlay">
    <h1 id="result-title"></h1>
    <p id="result-msg" style="font-size: 1.3rem;"></p>
    <button class="btn-main" onclick="initGame()">Play Again</button>
</div>

<script>
    const masterBank = [
        // Length
        { q: "Standard unit of Length is:", o: ["Gram", "Meter", "Liter", "Second"], a: 1 },
        { q: "1 kilometer is equal to:", o: ["100 m", "1000 m", "10 m", "500 m"], a: 1 },
        { q: "Thickness of a mobile phone is best measured in:", o: ["km", "m", "mm", "kg"], a: 2 },
        { q: "Tool to measure a playground length:", o: ["Ruler", "Measuring Tape", "Protractor", "Scale"], a: 1 },
        { q: "5 meters = ____ centimeters?", o: ["50 cm", "500 cm", "5000 cm", "5 cm"], a: 1 },
        { q: "Non-standard unit of length:", o: ["Meter", "Inch", "Handspan", "Yard"], a: 2 },
        { q: "1000 millimeters make:", o: ["1 meter", "1 centimeter", "1 kilometer", "10 meters"], a: 0 },
        // Weight/Mass
        { q: "Tool for measuring the mass of gold:", o: ["Electronic Balance", "Spring Balance", "Measuring Cup", "Ruler"], a: 0 },
        { q: "How many grams in 2.5 kg?", o: ["250 g", "2500 g", "25 g", "25000 g"], a: 1 },
        { q: "Mass of a feather is measured in:", o: ["kg", "mg", "L", "km"], a: 1 },
        { q: "1 quintal equals:", o: ["10 kg", "100 kg", "1000 kg", "50 kg"], a: 1 },
        { q: "To weigh a truck, we use:", o: ["Kitchen scale", "Weigh Bridge", "Hand span", "Ruler"], a: 1 },
        // Capacity
        { q: "Capacity of a bucket is measured in:", o: ["Meters", "Kilograms", "Liters", "Minutes"], a: 2 },
        { q: "Amount of ink in a pen is approx:", o: ["2 L", "2 mL", "200 mL", "2 kg"], a: 1 },
        { q: "500 mL + 500 mL makes:", o: ["1000 L", "1 L", "10 L", "5 L"], a: 1 },
        { q: "Tool used in labs for liquid volume:", o: ["Ruler", "Measuring Cylinder", "Clock", "Tape"], a: 1 },
        { q: "10 liters = ____ milliliters?", o: ["100 ml", "1000 ml", "10000 ml", "10 ml"], a: 2 },
        // Time
        { q: "Standard unit of time:", o: ["Hour", "Minute", "Second", "Day"], a: 2 },
        { q: "How many seconds in 5 minutes?", o: ["50 s", "300 s", "500 s", "60 s"], a: 1 },
        { q: "A leap year has how many days?", o: ["365", "366", "364", "360"], a: 1 },
        { q: "Clock used for racing:", o: ["Wall clock", "Stopwatch", "Sundial", "Alarm clock"], a: 1 },
        { q: "24 hours make one:", o: ["Week", "Month", "Solar Day", "Year"], a: 2 },
        { q: "An instrument used in ancient times for time:", o: ["Compass", "Sundial", "Microscope", "Ruler"], a: 1 },
        // Temperature
        { q: "Unit of Temperature:", o: ["Meter", "Celsius", "Liter", "Newton"], a: 1 },
        { q: "Freezing point of water:", o: ["100°C", "37°C", "0°C", "50°C"], a: 2 },
        { q: "Boiling point of water:", o: ["0°C", "100°C", "37°C", "212°C"], a: 1 },
        { q: "Normal human body temperature:", o: ["98.6°C", "37°C", "0°C", "100°C"], a: 1 },
        { q: "Tool to measure fever:", o: ["Lab Thermometer", "Clinical Thermometer", "Barometer", "Ruler"], a: 1 },
        { q: "Liquid used in traditional thermometers:", o: ["Water", "Oil", "Mercury", "Juice"], a: 2 },
        // General/Conversions
        { q: "Which is more: 2 kg or 2000 g?", o: ["2 kg", "2000 g", "They are equal", "None"], a: 2 },
        { q: "1/2 meter is how many cm?", o: ["25 cm", "50 cm", "75 cm", "100 cm"], a: 1 },
        { q: "Capacity of a teaspoon is approx:", o: ["5 mL", "5 L", "50 mL", "500 mL"], a: 0 },
        { q: "3:00 PM in 24-hour clock:", o: ["03:00", "15:00", "13:00", "23:00"], a: 1 },
        { q: "To measure the width of a book:", o: ["m", "km", "cm", "L"], a: 2 },
        { q: "How many weeks in a year?", o: ["48", "52", "50", "12"], a: 1 }
    ];

    let state = { score: 0, lives: 3, currentIdx: 0, shuffledQs: [], timeLeft: 100, timer: null };

    function initGame() {
        state = {
            score: 0, lives: 3, currentIdx: 0,
            shuffledQs: [...masterBank].sort(() => Math.random() - 0.5).slice(0, 10),
            timeLeft: 100
        };
        document.getElementById('overlay').style.display = 'none';
        updateUI();
        renderQuestion();
    }

    function startTimer() {
        clearInterval(state.timer);
        state.timeLeft = 100;
        state.timer = setInterval(() => {
            state.timeLeft -= 1; // Reduces by 1% every 100ms (10 seconds total)
            document.getElementById('timer-bar').style.width = state.timeLeft + "%";
            
            if (state.timeLeft <= 30) document.getElementById('timer-bar').style.background = "var(--danger)";
            else document.getElementById('timer-bar').style.background = "var(--success)";

            if (state.timeLeft <= 0) {
                clearInterval(state.timer);
                handleTimeout();
            }
        }, 100);
    }

    function renderQuestion() {
        const qData = state.shuffledQs[state.currentIdx];
        document.getElementById('q-text').innerText = qData.q;
        document.getElementById('progress').innerText = state.currentIdx + 1;
        
        const box = document.getElementById('options-box');
        box.innerHTML = '';
        
        qData.o.forEach((opt, idx) => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerText = opt;
            btn.onclick = () => checkAnswer(idx, btn);
            box.appendChild(btn);
        });
        startTimer();
    }

    function checkAnswer(choice, btn) {
        clearInterval(state.timer);
        const correct = state.shuffledQs[state.currentIdx].a;
        const all = document.querySelectorAll('.option-btn');
        all.forEach(b => b.disabled = true);

        if (choice === correct) {
            btn.classList.add('correct');
            state.score += 10;
        } else {
            btn.classList.add('wrong');
            all[correct].classList.add('correct');
            state.lives--;
        }

        updateUI();
        nextStep();
    }

    function handleTimeout() {
        state.lives--;
        const correct = state.shuffledQs[state.currentIdx].a;
        const all = document.querySelectorAll('.option-btn');
        all.forEach(b => b.disabled = true);
        all[correct].classList.add('correct');
        updateUI();
        nextStep();
    }

    function nextStep() {
        setTimeout(() => {
            if (state.lives <= 0) endGame("OUT OF LIVES! 💔");
            else if (state.currentIdx >= 9) endGame("VICTORY! 🏆");
            else { state.currentIdx++; renderQuestion(); }
        }, 1500);
    }

    function updateUI() {
        document.getElementById('score').innerText = state.score;
        document.getElementById('lives').innerText = state.lives;
    }

    function endGame(title) {
        clearInterval(state.timer);
        document.getElementById('overlay').style.display = 'flex';
        document.getElementById('result-title').innerText = title;
        document.getElementById('result-msg').innerText = `Final Score: ${state.score}/100`;
    }

    initGame();
</script>
</body>
</html>
