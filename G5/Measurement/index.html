<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Measurement Master: Grade 5</title>
    <style>
        :root {
            --primary: #1e3a8a; --success: #22c55e; --danger: #ef4444; --bg: #0f172a;
        }
        body {
            font-family: 'Segoe UI', sans-serif; background: var(--bg);
            margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; color: white;
        }
        
        /* START PAGE */
        #start-page {
            position: fixed; inset: 0; background: var(--bg);
            display: flex; flex-direction: column; justify-content: center;
            align-items: center; z-index: 3000; text-align: center; padding: 20px;
        }

        /* HEADER UNIT */
        #header-unit {
            width: 100%; background: #1e293b; position: sticky; top: 0;
            z-index: 1000; display: flex; flex-direction: column; align-items: center;
            border-bottom: 2px solid #334155; display: none;
        }

        #timer-display-box {
            display: flex; align-items: center; gap: 15px; padding: 10px; width: 90%; max-width: 600px;
        }

        #clock-timer {
            font-family: 'Courier New', monospace; font-size: 1.5rem; font-weight: bold;
            color: #00ff00; min-width: 90px; text-shadow: 0 0 5px #00ff00;
        }

        progress {
            flex-grow: 1; height: 20px; appearance: none; border: none; border-radius: 10px; overflow: hidden;
        }
        progress::-webkit-progress-bar { background-color: #334155; }
        progress::-webkit-progress-value { background-color: #00ff00; transition: width 0.1s linear; }
        .low-time::-webkit-progress-value { background-color: #ff4757; }

        #stats-bar { display: flex; justify-content: space-around; width: 100%; max-width: 600px; padding: 10px 0; font-weight: bold; }
        
        /* GAME CONTENT */
        #game-container { 
            background: white; color: #1e293b; width: 95%; max-width: 600px; 
            padding: 25px; margin-top: 20px; border-radius: 20px; text-align: center; display: none;
        }
        .question-text { font-size: 1.3rem; margin-bottom: 20px; font-weight: 600; min-height: 50px; }
        .options-grid { display: grid; grid-template-columns: 1fr; gap: 10px; }
        .option-btn { padding: 15px; border: 2px solid #e2e8f0; border-radius: 12px; background: white; cursor: pointer; font-size: 1.1rem; font-weight: 500; }
        .option-btn:hover:not(:disabled) { border-color: #3b82f6; background: #f8fafc; }
        .option-btn.correct { background: #dcfce7 !important; border-color: var(--success) !important; color: #166534; }
        .option-btn.wrong { background: #fee2e2 !important; border-color: var(--danger) !important; color: #991b1b; }
        
        #overlay { 
            display: none; position: fixed; inset: 0; background: rgba(15, 23, 42, 0.98); 
            flex-direction: column; justify-content: center; align-items: center; z-index: 2000; text-align: center; 
        }
        .btn-main { padding: 15px 40px; background: var(--success); color: white; border: none; border-radius: 30px; cursor: pointer; font-size: 1.2rem; font-weight: bold; }
    </style>
</head>
<body>

<!-- START PAGE -->
<div id="start-page">
    <h1 style="font-size: 2.5rem; color: #38bdf8;">📏 Measurement Master</h1>
    <p style="font-size: 1.2rem; max-width: 500px; line-height: 1.6;">
        Welcome! You have <b>20 seconds</b> per question to solve 10 measurement challenges. 
        Don't let the clock hit zero!
    </p>
    <button class="btn-main" onclick="startFirstTime()">Start Mission</button>
</div>

<!-- GAME UI -->
<div id="header-unit">
    <div id="timer-display-box">
        <span id="clock-timer">20.0s</span>
        <progress id="timer-bar" value="100" max="100"></progress>
    </div>
    <div id="stats-bar">
        <span>🏆 Score: <span id="score">0</span></span>
        <span>❤️ Lives: <span id="lives">3</span></span>
        <span>📝 Q: <span id="progress-count">1</span>/10</span>
    </div>
</div>

<div id="game-container">
    <p class="question-text" id="q-text">Loading...</p>
    <div class="options-grid" id="options-box"></div>
</div>

<!-- RESULT OVERLAY -->
<div id="overlay">
    <h1 id="result-title"></h1>
    <p id="result-msg" style="font-size: 1.4rem; margin-bottom: 20px;"></p>
    <button class="btn-main" onclick="initGame()">Play Again</button>
</div>

<script>
    const masterBank = [
        { q: "Standard unit of Length is:", o: ["Gram", "Meter", "Liter", "Second"], a: 1 },
        { q: "1 kilometer is equal to:", o: ["100 m", "1000 m", "10 m", "500 m"], a: 1 },
        { q: "Thickness of a pencil is best measured in:", o: ["km", "m", "mm", "kg"], a: 2 },
        { q: "5 meters = ____ centimeters?", o: ["50 cm", "500 cm", "5000 cm", "5 cm"], a: 1 },
        { q: "Non-standard unit of length:", o: ["Meter", "Inch", "Handspan", "Yard"], a: 2 },
        { q: "Electronic Balance measures:", o: ["Mass", "Length", "Capacity", "Time"], a: 0 },
        { q: "How many grams in 2.5 kg?", o: ["250 g", "2500 g", "25 g", "25000 g"], a: 1 },
        { q: "Standard unit for liquid capacity:", o: ["Litre", "Gram", "Meter", "Second"], a: 0 },
        { q: "500 mL + 500 mL makes:", o: ["1000 L", "1 L", "10 L", "5 L"], a: 1 },
        { q: "Standard unit of time:", o: ["Hour", "Minute", "Second", "Day"], a: 2 },
        { q: "Seconds in 1 minute:", o: ["10 s", "60 s", "3600 s", "100 s"], a: 1 },
        { q: "Freezing point of water is:", o: ["100°C", "37°C", "0°C", "50°C"], a: 2 },
        { q: "Boiling point of water is:", o: ["0°C", "100°C", "37°C", "212°C"], a: 1 },
        { q: "Human body temperature in Celsius:", o: ["98.6°C", "37°C", "0°C", "100°C"], a: 1 },
        { q: "Tool for measuring body fever:", o: ["Lab", "Clinical Thermometer", "Scale", "Tape"], a: 1 },
        { q: "Ancient tool for time:", o: ["Compass", "Sundial", "Ruler", "Tape"], a: 1 },
        { q: "Distance between cities is in:", o: ["mm", "m", "km", "L"], a: 2 },
        { q: "Hours in 2 full days:", o: ["24", "48", "72", "12"], a: 1 },
        { q: "1000 meters make 1 ____:", o: ["cm", "mm", "km", "dm"], a: 2 },
        { q: "To measure height, use a:", o: ["Tape", "Thermometer", "Scale", "Clock"], a: 0 }
    ];

    let state = { score: 0, lives: 3, currentIdx: 0, shuffledQs: [], timeLeft: 20.0, timer: null };

    function startFirstTime() {
        document.getElementById('start-page').style.display = 'none';
        document.getElementById('header-unit').style.display = 'flex';
        document.getElementById('game-container').style.display = 'block';
        initGame();
    }

    function initGame() {
        state.score = 0; state.lives = 3; state.currentIdx = 0;
        state.shuffledQs = [...masterBank].sort(() => Math.random() - 0.5).slice(0, 10);
        document.getElementById('overlay').style.display = 'none';
        updateUI(); renderQuestion();
    }

    function startTimer() {
        clearInterval(state.timer);
        state.timeLeft = 20.0;
        const bar = document.getElementById('timer-bar');
        const clock = document.getElementById('clock-timer');
        bar.value = 100;
        bar.classList.remove('low-time');
        clock.style.color = "#00ff00";

        state.timer = setInterval(() => {
            state.timeLeft -= 0.1;
            const percentage = (state.timeLeft / 20) * 100;
            bar.value = percentage;
            clock.innerText = state.timeLeft.toFixed(1) + "s";

            if (state.timeLeft <= 5.0) {
                bar.classList.add('low-time');
                clock.style.color = "#ff4757";
            }

            if (state.timeLeft <= 0) {
                clearInterval(state.timer);
                clock.innerText = "0.0s";
                handleAction(null, false);
            }
        }, 100); 
    }

    function renderQuestion() {
        const qData = state.shuffledQs[state.currentIdx];
        document.getElementById('q-text').innerText = qData.q;
        document.getElementById('progress-count').innerText = state.currentIdx + 1;
        const box = document.getElementById('options-box');
        box.innerHTML = '';
        qData.o.forEach((opt, idx) => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerText = opt;
            btn.onclick = () => handleAction(idx, true);
            box.appendChild(btn);
        });
        startTimer();
    }

    function handleAction(choice, answered) {
        clearInterval(state.timer);
        const correct = state.shuffledQs[state.currentIdx].a;
        const all = document.querySelectorAll('.option-btn');
        all.forEach(b => b.disabled = true);

        if (answered && choice === correct) {
            all[choice].classList.add('correct');
            state.score += 10;
        } else {
            if (answered) all[choice].classList.add('wrong');
            all[correct].classList.add('correct');
            state.lives--;
        }

        updateUI();
        setTimeout(() => {
            if (state.lives <= 0) endGame("GAME OVER 💔");
            else if (state.currentIdx >= 9) endGame("MASTERED! 🏆");
            else { state.currentIdx++; renderQuestion(); }
        }, 1500);
    }

    function updateUI() {
        document.getElementById('score').innerText = state.score;
        document.getElementById('lives').innerText = state.lives;
    }

    function endGame(title) {
        document.getElementById('overlay').style.display = 'flex';
        document.getElementById('result-title').innerText = title;
        document.getElementById('result-msg').innerText = `Score: ${state.score}/100`;
    }
</script>
</body>
</html>
