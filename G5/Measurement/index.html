<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Measurement Master: Grade 5</title>
    <style>
        :root {
            --primary: #1e3a8a; --success: #22c55e; --danger: #ef4444; --bg: #0f172a;
        }
        * { box-sizing: border-box; }
        body {
            margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg);
            display: flex; flex-direction: column; align-items: center; min-height: 100vh; color: white;
        }

        /* 1. START PAGE - Full Screen Fixed Overlay */
        #start-page {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg); display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 9999;
            text-align: center; padding: 20px;
        }

        /* 2. TIMER UNIT - CSS-based for 100% Visibility */
        #timer-container {
            width: 100%; height: 60px; background: #1e293b;
            display: none; align-items: center; justify-content: center;
            position: sticky; top: 0; z-index: 1000; border-bottom: 2px solid #334155;
        }
        #timer-outer {
            width: 70%; height: 20px; background: #334155;
            border-radius: 10px; overflow: hidden; margin-left: 15px;
        }
        #timer-inner {
            width: 100%; height: 100%; background: #00ff00;
            transition: width 0.1s linear, background 0.3s;
        }
        #clock-text {
            font-family: monospace; font-size: 1.5rem; font-weight: bold;
            color: #00ff00; min-width: 80px; text-align: right;
        }

        /* 3. GAME BOX */
        #game-container {
            background: white; color: #1e293b; width: 90%; max-width: 500px;
            padding: 25px; margin-top: 30px; border-radius: 20px;
            text-align: center; display: none; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .q-text { font-size: 1.2rem; font-weight: bold; margin-bottom: 20px; min-height: 50px; }
        .options-grid { display: grid; grid-template-columns: 1fr; gap: 10px; }
        .opt-btn {
            padding: 15px; border: 2px solid #e2e8f0; border-radius: 12px;
            background: white; cursor: pointer; font-size: 1rem; font-weight: 500;
        }
        .opt-btn.correct { background: #dcfce7 !important; border-color: var(--success) !important; }
        .opt-btn.wrong { background: #fee2e2 !important; border-color: var(--danger) !important; }

        /* REUSABLE BUTTON */
        .btn-main {
            padding: 15px 40px; background: var(--success); color: white;
            border: none; border-radius: 30px; cursor: pointer; font-size: 1.2rem; font-weight: bold;
        }
    </style>
</head>
<body>

<!-- START SCREEN -->
<div id="start-page">
    <h1 style="font-size: 2.5rem; color: #38bdf8;">📏 Measurement Master</h1>
    <p style="font-size: 1.2rem; margin: 20px 0;">30+ Questions | 20 Second Timer | Grade 5</p>
    <button class="btn-main" onclick="beginGame()">Start Mission</button>
</div>

<!-- TOP TIMER BAR -->
<div id="timer-container">
    <span id="clock-text">20.0s</span>
    <div id="timer-outer"><div id="timer-inner"></div></div>
</div>

<!-- MAIN QUIZ AREA -->
<div id="game-container">
    <div style="margin-bottom: 10px; font-weight: bold; color: #64748b;">
        Score: <span id="score">0</span> | Lives: <span id="lives">3</span>
    </div>
    <p class="q-text" id="q-text">Loading...</p>
    <div class="options-grid" id="options-box"></div>
</div>

<script>
    const questions = [
        { q: "Standard unit of Length is:", o: ["Gram", "Meter", "Liter", "Second"], a: 1 },
        { q: "1 kilometer is equal to:", o: ["100 m", "1000 m", "10 m", "500 m"], a: 1 },
        { q: "Thickness of a pencil is best measured in:", o: ["km", "m", "mm", "kg"], a: 2 },
        { q: "5 meters = ____ centimeters?", o: ["50 cm", "500 cm", "5000 cm", "5 cm"], a: 1 },
        { q: "Electronic Balance measures:", o: ["Mass", "Length", "Capacity", "Time"], a: 0 },
        { q: "How many grams in 2.5 kg?", o: ["250 g", "2500 g", "25 g", "25000 g"], a: 1 },
        { q: "Standard unit for liquid capacity:", o: ["Litre", "Gram", "Meter", "Second"], a: 0 },
        { q: "500 mL + 500 mL makes:", o: ["1000 L", "1 L", "10 L", "5 L"], a: 1 },
        { q: "Seconds in 1 minute:", o: ["10 s", "60 s", "3600 s", "100 s"], a: 1 },
        { q: "Freezing point of water is:", o: ["100°C", "37°C", "0°C", "50°C"], a: 2 },
        { q: "Distance between cities is in:", o: ["mm", "m", "km", "L"], a: 2 },
        { q: "Hours in 2 full days:", o: ["24", "48", "72", "12"], a: 1 },
        { q: "1000 meters make 1 ____:", o: ["cm", "mm", "km", "dm"], a: 2 },
        { q: "Tool for tracking ancient time:", o: ["Sundial", "Compass", "Scale", "Tape"], a: 0 },
        { q: "Convert 2 Liters to mL:", o: ["200 mL", "2000 mL", "20 mL", "2 mL"], a: 1 }
    ];

    let state = { score: 0, lives: 3, idx: 0, pool: [], timeLeft: 20, timer: null };

    function beginGame() {
        document.getElementById('start-page').style.display = 'none';
        document.getElementById('timer-container').style.display = 'flex';
        document.getElementById('game-container').style.display = 'block';
        reset();
    }

    function reset() {
        state.score = 0; state.lives = 3; state.idx = 0;
        state.pool = [...questions].sort(() => Math.random() - 0.5).slice(0, 10);
        updateStats(); loadQ();
    }

    function startClock() {
        clearInterval(state.timer);
        state.timeLeft = 20.0;
        const bar = document.getElementById('timer-inner');
        const txt = document.getElementById('clock-text');
        
        state.timer = setInterval(() => {
            state.timeLeft -= 0.1;
            bar.style.width = (state.timeLeft / 20 * 100) + "%";
            txt.innerText = state.timeLeft.toFixed(1) + "s";
            
            if (state.timeLeft <= 5) {
                bar.style.background = "#ef4444";
                txt.style.color = "#ef4444";
            } else {
                bar.style.background = "#00ff00";
                txt.style.color = "#00ff00";
            }

            if (state.timeLeft <= 0) {
                clearInterval(state.timer);
                handleAns(null, false);
            }
        }, 100);
    }

    function loadQ() {
        const q = state.pool[state.idx];
        document.getElementById('q-text').innerText = q.q;
        const box = document.getElementById('options-box');
        box.innerHTML = '';
        q.o.forEach((opt, i) => {
            const btn = document.createElement('button');
            btn.className = 'opt-btn';
            btn.innerText = opt;
            btn.onclick = () => handleAns(i, true);
            box.appendChild(btn);
        });
        startClock();
    }

    function handleAns(choice, ok) {
        clearInterval(state.timer);
        const correct = state.pool[state.idx].a;
        const btns = document.querySelectorAll('.opt-btn');
        btns.forEach(b => b.disabled = true);

        if (ok && choice === correct) {
            btns[choice].classList.add('correct');
            state.score += 10;
        } else {
            if (ok) btns[choice].classList.add('wrong');
            btns[correct].classList.add('correct');
            state.lives--;
        }

        updateStats();
        setTimeout(() => {
            if (state.lives <= 0 || state.idx >= 9) alert("Game Over! Score: " + state.score);
            else { state.idx++; loadQ(); }
        }, 1500);
    }

    function updateStats() {
        document.getElementById('score').innerText = state.score;
        document.getElementById('lives').innerText = state.lives;
    }
</script>
</body>
</html>
