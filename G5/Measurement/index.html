<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Measurement Master: Randomized Edition</title>
    <style>
        :root {
            --primary: #1e3a8a; --secondary: #3b82f6;
            --success: #22c55e; --danger: #ef4444; --bg: #f0f9ff;
        }
        body {
            font-family: 'Segoe UI', sans-serif; background: var(--bg);
            margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh;
        }
        #game-header { width: 100%; background: var(--primary); color: white; padding: 10px; text-align: center; }
        #stats-bar { display: flex; justify-content: space-around; width: 100%; max-width: 600px; margin: 15px 0; font-weight: bold; color: var(--primary); }
        #game-container { background: white; width: 90%; max-width: 600px; padding: 25px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; }
        .question-text { font-size: 1.2rem; margin-bottom: 20px; color: #1f2937; min-height: 60px; }
        .options-grid { display: grid; grid-template-columns: 1fr; gap: 10px; }
        .option-btn { padding: 12px; border: 2px solid #e5e7eb; border-radius: 10px; background: white; cursor: pointer; font-size: 1rem; transition: 0.2s; }
        .option-btn:hover { border-color: var(--secondary); background: #eff6ff; }
        .option-btn.correct { background: #dcfce7; border-color: var(--success); }
        .option-btn.wrong { background: #fee2e2; border-color: var(--danger); }
        #overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); flex-direction: column; justify-content: center; align-items: center; color: white; z-index: 100; text-align: center; }
        .btn-main { padding: 12px 35px; background: var(--success); color: white; border: none; border-radius: 25px; cursor: pointer; font-size: 1.1rem; margin-top: 20px; }
    </style>
</head>
<body>

<div id="game-header"><h1>📏 Measurement Master Challenge</h1></div>
<div id="stats-bar">
    <span>🏆 Score: <span id="score">0</span></span>
    <span>❤️ Lives: <span id="lives">3</span></span>
    <span>📝 Progress: <span id="progress">1</span>/10</span>
</div>

<div id="game-container">
    <p class="question-text" id="q-text">Loading...</p>
    <div class="options-grid" id="options-box"></div>
</div>

<div id="overlay">
    <h1 id="result-title"></h1>
    <p id="result-msg" style="font-size: 1.2rem;"></p>
    <button class="btn-main" onclick="initGame()">Play New Round</button>
</div>

<script>
    // Expanded 20-Question Bank based on Birla Open Minds plan [0.1.1 - 0.1.5]
    const masterBank = [
        { q: "Which tool is most accurate for measuring a dining table?", o: ["Handspan", "Measuring Tape", "Cubit", "Footstep"], a: 1 },
        { q: "How many meters are in 500 centimeters?", o: ["50 m", "0.5 m", "5 m", "5000 m"], a: 2 },
        { q: "Which unit would you use to measure the mass of a pencil?", o: ["Kilograms", "Grams", "Liters", "Meters"], a: 1 },
        { q: "If a room is 4 meters long, what is its length in centimeters?", o: ["40 cm", "400 cm", "4000 cm", "4 cm"], a: 1 },
        { q: "What tool measures the capacity of a small cough syrup bottle?", o: ["Measuring Jar (mL)", "Thermometer", "Ruler", "Weighing Scale"], a: 0 },
        { q: "Convert 3 Liters into Milliliters:", o: ["30 mL", "300 mL", "3000 mL", "3 mL"], a: 2 },
        { q: "Which of these is used to measure time?", o: ["Clinical Thermometer", "Stopwatch", "Measuring Tape", "Beaker"], a: 1 },
        { q: "What is the normal human body temperature approx?", o: ["100°C", "0°C", "37°C", "50°C"], a: 2 },
        { q: "Which tool would you use to check if a day is the 'coldest day'?", o: ["Clock", "Weather Thermometer", "Measuring Cup", "Scale"], a: 1 },
        { q: "Why should you wash a thermometer before use?", o: ["To make it colder", "For hygiene/safety", "To reset the time", "To make it shine"], a: 1 },
        { q: "Which unit is best for the distance between two cities?", o: ["Millimeters", "Centimeters", "Meters", "Kilometers"], a: 3 },
        { q: "Which tool measures the mass of a bag of rice?", o: ["Ruler", "Measuring Cylinder", "Electronic Balance", "Clock"], a: 2 },
        { q: "1 kilogram (kg) is equal to how many grams?", o: ["100 g", "500 g", "1000 g", "10 g"], a: 2 },
        { q: "What is capacity?", o: ["Length of an object", "Amount of liquid a container holds", "How heavy something is", "Duration of an event"], a: 1 },
        { q: "How many minutes are in 2 hours?", o: ["60 mins", "100 mins", "120 mins", "24 mins"], a: 2 },
        { q: "Which tool did people use for time before clocks?", o: ["Sundial", "Thermometer", "Calculator", "Tape"], a: 0 },
        { q: "What does a clinical thermometer measure?", o: ["Room heat", "Body temperature", "Mass of water", "Time"], a: 1 },
        { q: "Convert 2500 mL to Liters:", o: ["25 L", "2.5 L", "0.25 L", "250 L"], a: 1 },
        { q: "Which is heavier: 1kg of iron or 500g of cotton?", o: ["500g Cotton", "1kg Iron", "They are same", "Depends on size"], a: 1 },
        { q: "Which time unit is smallest?", o: ["Hour", "Minute", "Second", "Day"], a: 2 }
    ];

    let gameState = { score: 0, lives: 3, currentIdx: 0, shuffledQs: [] };

    function initGame() {
        // Pick 10 random questions out of 20
        gameState = {
            score: 0, lives: 3, currentIdx: 0,
            shuffledQs: [...masterBank].sort(() => Math.random() - 0.5).slice(0, 10)
        };
        document.getElementById('overlay').style.display = 'none';
        updateUI();
        renderQuestion();
    }

    function renderQuestion() {
        const qData = gameState.shuffledQs[gameState.currentIdx];
        document.getElementById('q-text').innerText = qData.q;
        document.getElementById('progress').innerText = gameState.currentIdx + 1;
        
        const optionsBox = document.getElementById('options-box');
        optionsBox.innerHTML = '';
        
        qData.o.forEach((opt, idx) => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerText = opt;
            btn.onclick = () => checkAnswer(idx, btn);
            optionsBox.appendChild(btn);
        });
    }

    function checkAnswer(choice, btn) {
        const correctIdx = gameState.shuffledQs[gameState.currentIdx].a;
        document.querySelectorAll('.option-btn').forEach(b => b.disabled = true);

        if (choice === correctIdx) {
            btn.classList.add('correct');
            gameState.score += 10;
        } else {
            btn.classList.add('wrong');
            document.querySelectorAll('.option-btn')[correctIdx].classList.add('correct');
            gameState.lives--;
        }

        updateUI();
        setTimeout(() => {
            if (gameState.lives <= 0) endGame("MISSION FAILED");
            else if (gameState.currentIdx >= 9) endGame("MISSION ACCOMPLISHED");
            else { gameState.currentIdx++; renderQuestion(); }
        }, 1200);
    }

    function updateUI() {
        document.getElementById('score').innerText = gameState.score;
        document.getElementById('lives').innerText = gameState.lives;
    }

    function endGame(title) {
        document.getElementById('overlay').style.display = 'flex';
        document.getElementById('result-title').innerText = title;
        document.getElementById('result-msg').innerText = `You correctly answered ${gameState.score/10} out of 10 items.`;
    }

    initGame();
</script>
</body>
</html>
