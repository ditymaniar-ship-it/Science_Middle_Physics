<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Measurement Master: Grade 5</title>
    <style>
        :root {
            --primary: #1e3a8a; --success: #22c55e; --danger: #ef4444; --bg: #0f172a;
        }
        * { box-sizing: border-box; }
        body {
            margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg);
            display: flex; flex-direction: column; align-items: center; min-height: 100vh; color: white;
        }

        /* 1. START PAGE */
        #start-screen {
            position: fixed; inset: 0; background: var(--bg);
            display: flex; flex-direction: column; justify-content: center;
            align-items: center; z-index: 9999; text-align: center; padding: 20px;
        }

        /* 2. HUD (Timer & Stats) */
        #hud {
            width: 100%; background: #1e293b; padding: 15px;
            display: none; flex-direction: column; align-items: center;
            position: sticky; top: 0; z-index: 1000; border-bottom: 3px solid #334155;
        }
        #timer-row { display: flex; align-items: center; width: 95%; max-width: 600px; gap: 15px; }
        #clock-digital { font-family: monospace; font-size: 1.8rem; color: #00ff00; min-width: 90px; text-shadow: 0 0 8px #00ff00; }
        #bar-outer { flex-grow: 1; height: 14px; background: #334155; border-radius: 10px; overflow: hidden; }
        #bar-inner { width: 100%; height: 100%; background: #00ff00; transition: width 0.1s linear; }

        /* 3. QUIZ BOX */
        #quiz-container {
            background: white; color: #1e293b; width: 95%; max-width: 550px;
            padding: 30px; border-radius: 20px; margin-top: 30px;
            text-align: center; display: none; box-shadow: 0 10px 40px rgba(0,0,0,0.5);
        }
        .q-text { font-size: 1.3rem; font-weight: 700; margin-bottom: 25px; line-height: 1.4; }
        .options-grid { display: grid; grid-template-columns: 1fr; gap: 12px; }
        .opt-btn {
            padding: 16px; border: 2px solid #e2e8f0; border-radius: 15px;
            background: white; cursor: pointer; font-size: 1.1rem; font-weight: 600; transition: 0.2s;
        }
        .opt-btn:hover:not(:disabled) { border-color: #3b82f6; background: #f8fafc; }
        .correct { background: #dcfce7 !important; border-color: #22c55e !important; color: #166534; }
        .wrong { background: #fee2e2 !important; border-color: #ef4444 !important; color: #991b1b; }

        /* 4. RESULT OVERLAY (The "Good" Ending) */
        #result-screen {
            position: fixed; inset: 0; background: rgba(15, 23, 42, 0.98);
            display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 5000;
            text-align: center; padding: 20px;
        }

        .btn-main {
            padding: 18px 50px; background: #22c55e; color: white;
            border: none; border-radius: 40px; cursor: pointer; font-size: 1.4rem; font-weight: bold;
            box-shadow: 0 5px 15px rgba(34, 197, 94, 0.4); transition: 0.2s;
        }
        .btn-main:hover { transform: scale(1.05); }
    </style>
</head>
<body>

    <!-- START SCREEN -->
    <div id="start-screen">
        <h1 style="font-size: 3rem; color: #38bdf8; margin: 0;">📏 Measurement Master</h1>
        <p style="font-size: 1.3rem; color: #94a3b8; margin: 25px 0;">
            Mission: Solve 10 Challenges.<br>
            Time: <b>20 Seconds</b> each!
        </p>
        <button class="btn-main" onclick="startApp()">START MISSION</button>
    </div>

    <!-- HUD -->
    <div id="hud">
        <div id="timer-row">
            <span id="clock-digital">20.0s</span>
            <div id="bar-outer"><div id="bar-inner"></div></div>
        </div>
        <div style="font-weight: bold; margin-top: 10px; color: #cbd5e1;">
            Score: <span id="score-val">0</span> | Lives: <span id="lives-val">3</span> | Q: <span id="q-count">1</span>/10
        </div>
    </div>

    <!-- QUIZ -->
    <div id="quiz-container">
        <p class="q-text" id="q-text">Loading...</p>
        <div class="options-grid" id="options-list"></div>
    </div>

    <!-- FINAL RESULT SCREEN -->
    <div id="result-screen">
        <h1 id="res-title" style="font-size: 3.5rem; margin-bottom: 10px;"></h1>
        <p id="res-msg" style="font-size: 1.6rem; margin-bottom: 30px; color: #cbd5e1;"></p>
        <button class="btn-main" onclick="location.reload()">PLAY AGAIN</button>
    </div>

<script>
    const masterBank = [
        { q: "Standard unit of Length is:", o: ["Gram", "Meter", "Liter", "Second"], a: 1 },
        { q: "1 kilometer is equal to:", o: ["100 m", "1000 m", "10 m", "500 m"], a: 1 },
        { q: "Thickness of a pencil is measured in:", o: ["km", "m", "mm", "kg"], a: 2 },
        { q: "5 meters = ____ centimeters?", o: ["50 cm", "500 cm", "5000 cm", "5 cm"], a: 1 },
        { q: "100 kg is equal to 1 ____:", o: ["Tonne", "Quintal", "Gram", "Meter"], a: 1 },
        { q: "How many grams in 2.5 kg?", o: ["250 g", "2500 g", "25 g", "25000 g"], a: 1 },
        { q: "Electronic Balance measures:", o: ["Mass", "Length", "Capacity", "Time"], a: 0 },
        { q: "Standard unit for liquid capacity:", o: ["Litre", "Gram", "Meter", "Second"], a: 0 },
        { q: "500 mL + 500 mL makes:", o: ["1000 L", "1 L", "10 L", "5 L"], a: 1 },
        { q: "Seconds in 1 minute:", o: ["10 s", "60 s", "3600 s", "100 s"], a: 1 },
        { q: "Freezing point of water is:", o: ["100°C", "37°C", "0°C", "50°C"], a: 2 },
        { q: "Boiling point of water is:", o: ["0°C", "100°C", "37°C", "212°C"], a: 1 },
        { q: "Human body temperature in Celsius:", o: ["98.6°C", "37°C", "0°C", "100°C"], a: 1 },
        { q: "Tool for tracking ancient time:", o: ["Sundial", "Compass", "Scale", "Tape"], a: 0 },
        { q: "24-hour time for 4:00 PM:", o: ["04:00", "14:00", "16:00", "20:00"], a: 2 },
        { q: "10 liters = ____ milliliters?", o: ["100 ml", "1000 ml", "10000 ml", "10 ml"], a: 2 },
        { q: "A leap year has:", o: ["365 days", "366 days", "364 days", "360 days"], a: 1 },
        { q: "Convert 3 Liters to mL:", o: ["300 mL", "3000 mL", "30 mL", "3 mL"], a: 1 },
        { q: "How many weeks in a year?", o: ["48", "52", "50", "12"], a: 1 },
        { q: "Standard unit for mass:", o: ["Meter", "Gram", "Liter", "Second"], a: 1 },
        { q: "120 minutes is equal to:", o: ["1 hr", "2 hrs", "3 hrs", "12 hrs"], a: 1 },
        { q: "50 cm is what part of a meter?", o: ["Quarter", "Half", "Full", "One-third"], a: 1 },
        { q: "Smallest unit of time:", o: ["Hour", "Minute", "Second", "Day"], a: 2 },
        { q: "Instrument for body fever:", o: ["Lab", "Clinical", "Barometer", "Ruler"], a: 1 },
        { q: "1000 mm make 1 ____:", o: ["cm", "m", "km", "dm"], a: 1 },
        { q: "Tool to measure height:", o: ["Tape", "Thermometer", "Scale", "Clock"], a: 0 },
        { q: "How many seconds in 5 minutes?", o: ["50 s", "300 s", "500 s", "60 s"], a: 1 },
        { q: "Mass of a feather is measured in:", o: ["kg", "mg", "L", "km"], a: 1 },
        { q: "1/2 meter is how many cm?", o: ["25 cm", "50 cm", "75 cm", "100 cm"], a: 1 },
        { q: "Boiling point in Fahrenheit is:", o: ["100°F", "212°F", "32°F", "98°F"], a: 1 },
        { q: "Distance between cities is in:", o: ["mm", "m", "km", "L"], a: 2 },
        { q: "Hours in 2 full days:", o: ["24", "48", "72", "12"], a: 1 },
        { q: "Liquid in old thermometers:", o: ["Water", "Oil", "Mercury", "Juice"], a: 2 },
        { q: "Tool to measure liquid volume:", o: ["Ruler", "Measuring Cylinder", "Scale", "Tape"], a: 1 },
        { q: "A decade is how many years?", o: ["5 years", "10 years", "50 years", "100 years"], a: 1 }
    ];

    let state = { score: 0, lives: 3, idx: 0, pool: [], timer: null, timeLeft: 20.0 };

    function startApp() {
        document.getElementById('start-screen').style.display = 'none';
        document.getElementById('hud').style.display = 'flex';
        document.getElementById('quiz-container').style.display = 'block';
        reset();
    }

    function reset() {
        state.score = 0; state.lives = 3; state.idx = 0;
        state.pool = [...masterBank].sort(() => Math.random() - 0.5).slice(0, 10);
        updateUI();
        loadNextQ();
    }

    function startClock() {
        clearInterval(state.timer);
        state.timeLeft = 20.0;
        const clock = document.getElementById('clock-digital');
        const bar = document.getElementById('bar-inner');
        
        state.timer = setInterval(() => {
            state.timeLeft -= 0.1;
            clock.innerText = state.timeLeft.toFixed(1) + "s";
            bar.style.width = (state.timeLeft / 20 * 100) + "%";

            if (state.timeLeft <= 5) {
                clock.style.color = "#ef4444";
                bar.style.background = "#ef4444";
            } else {
                clock.style.color = "#00ff00";
                bar.style.background = "#00ff00";
            }

            if (state.timeLeft <= 0) {
                clearInterval(state.timer);
                handleSubmission(null, false);
            }
        }, 100);
    }

    function loadNextQ() {
        const data = state.pool[state.idx];
        document.getElementById('q-text').innerText = data.q;
        document.getElementById('q-count').innerText = state.idx + 1;
        const list = document.getElementById('options-list');
        list.innerHTML = '';

        data.o.forEach((opt, i) => {
            const btn = document.createElement('button');
            btn.className = 'opt-btn';
            btn.innerText = opt;
            btn.onclick = () => handleSubmission(i, true);
            list.appendChild(btn);
        });
        startClock();
    }

    function handleSubmission(choice, answered) {
        clearInterval(state.timer);
        const correct = state.pool[state.idx].a;
        const btns = document.querySelectorAll('.opt-btn');
        btns.forEach(b => b.disabled = true);

        if (answered && choice === correct) {
            btns[choice].classList.add('correct');
            state.score += 10;
        } else {
            if (answered) btns[choice].classList.add('wrong');
            btns[correct].classList.add('correct');
            state.lives--;
        }

        updateUI();

        setTimeout(() => {
            if (state.lives <= 0) showFinal("MISSION FAILED 💔", "Practice makes perfect!");
            else if (state.idx >= 9) showFinal("VICTORY! 🏆", "You are a Measurement Master!");
            else { state.idx++; loadNextQ(); }
        }, 1500);
    }

    function updateUI() {
        document.getElementById('score-val').innerText = state.score;
        document.getElementById('lives-val').innerText = state.lives;
    }

    function showFinal(title, msg) {
        const screen = document.getElementById('result-screen');
        screen.style.display = 'flex';
        document.getElementById('res-title').innerText = title;
        document.getElementById('res-msg').innerText = `${msg} \n Final Score: ${state.score}/100`;
    }
</script>
</body>
</html>
