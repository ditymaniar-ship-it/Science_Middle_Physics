<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Measurement Master: Time Attack</title>
    <style>
        :root {
            --primary: #1e3a8a; --success: #22c55e; --danger: #ef4444; --bg: #0f172a;
        }
        body {
            font-family: 'Segoe UI', sans-serif; background: var(--bg);
            margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; color: white;
        }
        #game-header { width: 100%; background: var(--primary); padding: 15px; text-align: center; }

        /* NATIVE PROGRESS BAR - Guaranteed Visibility */
        progress {
            width: 100%;
            height: 20px;
            appearance: none;
            border: none;
            position: sticky;
            top: 0;
        }
        progress::-webkit-progress-bar { background-color: #1e293b; }
        progress::-webkit-progress-value { 
            background-color: #00ff00; 
            box-shadow: 0 0 10px #00ff00;
            transition: width 0.1s linear;
        }
        /* Color change for low time */
        .low-time::-webkit-progress-value { background-color: #ff4757; box-shadow: 0 0 10px #ff4757; }

        #stats-bar { display: flex; justify-content: space-around; width: 100%; max-width: 600px; margin: 15px 0; font-weight: bold; font-size: 1.2rem; }
        #game-container { background: white; color: #1e293b; width: 90%; max-width: 600px; padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); text-align: center; }
        .question-text { font-size: 1.3rem; margin-bottom: 20px; font-weight: 600; min-height: 50px; }
        .options-grid { display: grid; grid-template-columns: 1fr; gap: 10px; }
        .option-btn { padding: 15px; border: 2px solid #e2e8f0; border-radius: 12px; background: white; cursor: pointer; font-size: 1.1rem; transition: 0.2s; font-weight: 500; }
        .option-btn:hover:not(:disabled) { border-color: #3b82f6; background: #f8fafc; }
        .option-btn.correct { background: #dcfce7 !important; border-color: var(--success) !important; color: #166534; }
        .option-btn.wrong { background: #fee2e2 !important; border-color: var(--danger) !important; color: #991b1b; }
        
        #overlay { display: none; position: fixed; inset: 0; background: rgba(15, 23, 42, 0.98); flex-direction: column; justify-content: center; align-items: center; z-index: 1000; text-align: center; }
        .btn-main { padding: 15px 40px; background: var(--success); color: white; border: none; border-radius: 30px; cursor: pointer; font-size: 1.2rem; margin-top: 25px; font-weight: bold; }
    </style>
</head>
<body>

<progress id="timer-bar" value="100" max="100"></progress>
<div id="game-header"><h1>📏 Measurement Challenge</h1></div>

<div id="stats-bar">
    <span>🏆 Score: <span id="score">0</span></span>
    <span>❤️ Lives: <span id="lives">3</span></span>
    <span>📝 Q: <span id="progress-count">1</span>/10</span>
</div>

<div id="game-container">
    <p class="question-text" id="q-text">Ready?</p>
    <div class="options-grid" id="options-box"></div>
</div>

<div id="overlay">
    <h1 id="result-title"></h1>
    <p id="result-msg" style="font-size: 1.4rem;"></p>
    <button class="btn-main" onclick="initGame()">Play Again</button>
</div>

<script>
    const masterBank = [
        { q: "Standard unit of Length is:", o: ["Gram", "Meter", "Liter", "Second"], a: 1 },
        { q: "1 kilometer is equal to:", o: ["100 m", "1000 m", "10 m", "500 m"], a: 1 },
        { q: "Thickness of a pencil is best measured in:", o: ["km", "m", "mm", "kg"], a: 2 },
        { q: "5 meters = ____ centimeters?", o: ["50 cm", "500 cm", "5000 cm", "5 cm"], a: 1 },
        { q: "Non-standard unit of length:", o: ["Meter", "Inch", "Handspan", "Yard"], a: 2 },
        { q: "Electronic Balance measures:", o: ["Mass", "Length", "Capacity", "Time"], a: 0 },
        { q: "How many grams in 2.5 kg?", o: ["250 g", "2500 g", "25 g", "25000 g"], a: 1 },
        { q: "100 kg is equal to 1 ____:", o: ["Tonne", "Quintal", "Gram", "Meter"], a: 1 },
        { q: "Standard unit for liquid capacity:", o: ["Litre", "Gram", "Meter", "Second"], a: 0 },
        { q: "500 mL + 500 mL makes:", o: ["1000 L", "1 L", "10 L", "5 L"], a: 1 },
        { q: "10 liters = ____ milliliters?", o: ["100 ml", "1000 ml", "10000 ml", "10 ml"], a: 2 },
        { q: "Standard unit of time:", o: ["Hour", "Minute", "Second", "Day"], a: 2 },
        { q: "Seconds in 1 minute:", o: ["10 s", "60 s", "3600 s", "100 s"], a: 1 },
        { q: "A leap year has:", o: ["365 days", "366 days", "364 days", "360 days"], a: 1 },
        { q: "Freezing point of water is:", o: ["100°C", "37°C", "0°C", "50°C"], a: 2 },
        { q: "Boiling point of water is:", o: ["0°C", "100°C", "37°C", "212°C"], a: 1 },
        { q: "Human body temperature in Celsius:", o: ["98.6°C", "37°C", "0°C", "100°C"], a: 1 },
        { q: "Tool for measuring body fever:", o: ["Lab Thermometer", "Clinical Thermometer", "Barometer", "Ruler"], a: 1 },
        { q: "Liquid inside older thermometers:", o: ["Water", "Oil", "Mercury", "Alcohol"], a: 2 },
        { q: "24-hour time for 4:00 PM:", o: ["04:00", "14:00", "16:00", "20:00"], a: 2 },
        { q: "Distance between cities is in:", o: ["mm", "m", "km", "L"], a: 2 },
        { q: "Hours in 2 full days:", o: ["24", "48", "72", "12"], a: 1 },
        { q: "What is capacity?", o: ["Weight", "Volume of liquid", "Distance", "Time"], a: 1 },
        { q: "Mass of a feather is measured in:", o: ["kg", "mg", "L", "km"], a: 1 },
        { q: "How many weeks in a year?", o: ["48", "52", "50", "12"], a: 1 },
        { q: "Ancient tool for time:", o: ["Compass", "Sundial", "Microscope", "Tape"], a: 1 },
        { q: "Tool to measure liquid volume:", o: ["Ruler", "Measuring Cylinder", "Scale", "Tape"], a: 1 },
        { q: "3 kg is equal to:", o: ["30 g", "300 g", "3000 g", "3 g"], a: 2 },
        { q: "How many cm in half a meter?", o: ["25 cm", "50 cm", "75 cm", "100 cm"], a: 1 },
        { q: "Tool for gold weighing:", o: ["Electronic balance", "Ruler", "Measuring tape", "Clock"], a: 0 },
        { q: "Smallest unit of time:", o: ["Hour", "Minute", "Second", "Day"], a: 2 },
        { q: "Standard unit for mass:", o: ["Meter", "Gram", "Liter", "Second"], a: 1 },
        { q: "1000 meters make 1 ____:", o: ["cm", "mm", "km", "dm"], a: 2 },
        { q: "120 minutes is equal to:", o: ["1 hour", "2 hours", "3 hours", "12 hours"], a: 1 },
        { q: "To measure height, use a:", o: ["Measuring tape", "Thermometer", "Scale", "Clock"], a: 0 }
    ];

    let state = { score: 0, lives: 3, currentIdx: 0, shuffledQs: [], timeLeft: 100, timer: null };

    function initGame() {
        state.score = 0; state.lives = 3; state.currentIdx = 0;
        state.shuffledQs = [...masterBank].sort(() => Math.random() - 0.5).slice(0, 10);
        document.getElementById('overlay').style.display = 'none';
        updateUI(); renderQuestion();
    }

    function startTimer() {
        clearInterval(state.timer);
        state.timeLeft = 100;
        const bar = document.getElementById('timer-bar');
        bar.value = 100;
        bar.classList.remove('low-time');

        state.timer = setInterval(() => {
            state.timeLeft -= 1;
            bar.value = state.timeLeft;

            if (state.timeLeft <= 30) bar.classList.add('low-time');

            if (state.timeLeft <= 0) {
                clearInterval(state.timer);
                handleAction(null, false);
            }
        }, 100); 
    }

    function renderQuestion() {
        const qData = state.shuffledQs[state.currentIdx];
        document.getElementById('q-text').innerText = qData.q;
        document.getElementById('progress-count').innerText = state.currentIdx + 1;
        const box = document.getElementById('options-box');
        box.innerHTML = '';
        qData.o.forEach((opt, idx) => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerText = opt;
            btn.onclick = () => handleAction(idx, true);
            box.appendChild(btn);
        });
        startTimer();
    }

    function handleAction(choice, answered) {
        clearInterval(state.timer);
        const correct = state.shuffledQs[state.currentIdx].a;
        const all = document.querySelectorAll('.option-btn');
        all.forEach(b => b.disabled = true);

        if (answered && choice === correct) {
            all[choice].classList.add('correct');
            state.score += 10;
        } else {
            if (answered) all[choice].classList.add('wrong');
            all[correct].classList.add('correct');
            state.lives--;
        }

        updateUI();
        setTimeout(() => {
            if (state.lives <= 0) endGame("GAME OVER! 💔");
            else if (state.currentIdx >= 9) endGame("MEASUREMENT MASTER! 🏆");
            else { state.currentIdx++; renderQuestion(); }
        }, 1500);
    }

    function updateUI() {
        document.getElementById('score').innerText = state.score;
        document.getElementById('lives').innerText = state.lives;
    }

    function endGame(title) {
        document.getElementById('overlay').style.display = 'flex';
        document.getElementById('result-title').innerText = title;
        document.getElementById('result-msg').innerText = `Your Score: ${state.score}/100`;
    }

    initGame();
</script>
</body>
</html>
