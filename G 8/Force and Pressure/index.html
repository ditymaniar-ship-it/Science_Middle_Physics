<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pressure Pilot: Physics Challenge</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0b0e14;
            --accent-color: #00d4ff;
            --correct-color: #2ecc71;
            --wrong-color: #e74c3c;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Roboto', sans-serif;
            background-color: var(--bg-color);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        #game-container {
            width: 95%;
            max-width: 600px;
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid var(--accent-color);
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 0 20px var(--accent-color);
            position: relative;
        }

        h1 { font-family: 'Orbitron', sans-serif; color: var(--accent-color); margin-bottom: 10px; }
        
        #stats-bar {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
            font-weight: bold;
        }

        #timer-bar {
            width: 100%;
            height: 10px;
            background: #333;
            border-radius: 5px;
            margin-bottom: 20px;
        }

        #timer-fill {
            height: 100%;
            width: 100%;
            background: var(--accent-color);
            border-radius: 5px;
            transition: width 1s linear;
        }

        #question-text {
            font-size: 1.2rem;
            margin-bottom: 20px;
            min-height: 80px;
        }

        .option-btn {
            display: block;
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid white;
            color: white;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
            transition: 0.3s;
        }

        .option-btn:hover { background: rgba(0, 212, 255, 0.2); }
        .correct { background-color: var(--correct-color) !important; }
        .wrong { background-color: var(--wrong-color) !important; }

        #screen-overlay {
            display: none;
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
        }

        .btn-restart {
            padding: 15px 30px;
            background: var(--accent-color);
            border: none;
            color: black;
            font-weight: bold;
            border-radius: 5px;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div id="game-container">
    <div id="stats-bar">
        <span>Lives: <span id="lives">3</span> ❤️</span>
        <span>Score: <span id="score">0</span></span>
    </div>
    <div id="timer-bar"><div id="timer-fill"></div></div>
    
    <div id="game-box">
        <h2 id="level-indicator">Level 1</h2>
        <p id="question-text">Loading question...</p>
        <div id="options-container"></div>
    </div>

    <div id="screen-overlay">
        <h2 id="overlay-title">GAME OVER</h2>
        <p id="final-score"></p>
        <button class="btn-restart" onclick="resetGame()">RESTART MISSION</button>
    </div>
</div>

<script>
    const questions = [
        { q: "A 'desert-bus' uses wider tires to cross dunes. Why?", a: ["Increase friction", "Reduce pressure by increasing area", "Decrease total weight", "Dig into sand"], correct: 1 },
        { q: "A carpenter sharpens a dowel to a point. Why does it enter the wood easily now?", a: ["Increased total force", "Reduced friction", "Smaller area creates higher pressure", "Chemical reaction"], correct: 2 },
        { q: "A bag of chips puffs up on a high mountain. Why?", a: ["Inside air got colder", "Gravity is stronger", "External atmospheric pressure decreased", "The bag is air-tight"], correct: 2 },
        { q: "Bucket A (Water) vs Bucket B (Dense Syrup). Both same height. Which has more base pressure?", a: ["Both identical", "Bucket B (Higher density)", "Bucket A (Lower density)", "Height is the only factor"], correct: 1 },
        { q: "Water shoots farthest from the bottom hole of a bottle. This proves:", a: ["Gravity only acts on the bottom", "Pressure increases with depth", "Air pushes the bottom water", "Liquids are heavier near the ground"], correct: 1 },
        { q: "A person (600N) wears Snowshoes, Sneakers, or High Heels. Which damages a wooden floor most?", a: ["Snowshoes", "Sneakers", "High Heels (Highest pressure)", "All are the same"], correct: 2 },
        { q: "How does a hydraulic lift move a heavy car with a small force?", a: ["Creates energy", "Increases liquid volume", "Same pressure acts on a larger area", "Moves liquid faster"], correct: 2 },
        { q: "Why is a bed of 1,000 nails safe to lie on?", a: ["Weight is spread over large area", "Nails are made of soft steel", "Weight decreases when lying down", "Air pushes you up"], correct: 0 },
        { q: "Why do non-rated cameras get crushed in the deep ocean?", a: ["Salt corrosion", "Cold water", "Crushing weight of the water column", "Deep sea fish"], correct: 2 },
        { q: "What holds a suction cup to a window?", a: ["Sticky rubber", "External air pressure pushing it", "Magnetic attraction", "Gravity"], correct: 1 }
    ];

    let currentQ = 0;
    let score = 0;
    let lives = 3;
    let timeLeft = 20;
    let timerInterval;

    function initQuestion() {
        if (currentQ >= questions.length) {
            endGame(true);
            return;
        }
        
        timeLeft = 20;
        document.getElementById('timer-fill').style.width = '100%';
        
        const qData = questions[currentQ];
        document.getElementById('level-indicator').innerText = `Question ${currentQ + 1}`;
        document.getElementById('question-text').innerText = qData.q;
        
        const container = document.getElementById('options-container');
        container.innerHTML = '';
        
        qData.a.forEach((opt, index) => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerText = opt;
            btn.onclick = () => checkAnswer(index);
            container.appendChild(btn);
        });

        startTimer();
    }

    function startTimer() {
        clearInterval(timerInterval);
        timerInterval = setInterval(() => {
            timeLeft--;
            document.getElementById('timer-fill').style.width = (timeLeft / 20 * 100) + '%';
            if (timeLeft <= 0) {
                handleWrong();
            }
        }, 1000);
    }

    function checkAnswer(idx) {
        clearInterval(timerInterval);
        const btns = document.getElementsByClassName('option-btn');
        if (idx === questions[currentQ].correct) {
            btns[idx].classList.add('correct');
            score += 100 + (timeLeft * 5);
            document.getElementById('score').innerText = score;
            setTimeout(() => {
                currentQ++;
                initQuestion();
            }, 1000);
        } else {
            btns[idx].classList.add('wrong');
            btns[questions[currentQ].correct].classList.add('correct');
            handleWrong();
        }
    }

    function handleWrong() {
        lives--;
        document.getElementById('lives').innerText = lives;
        if (lives <= 0) {
            endGame(false);
        } else {
            setTimeout(() => {
                currentQ++;
                initQuestion();
            }, 1500);
        }
    }

    function endGame(win) {
        clearInterval(timerInterval);
        const overlay = document.getElementById('screen-overlay');
        overlay.style.display = 'flex';
        document.getElementById('overlay-title').innerText = win ? "MISSION COMPLETE!" : "SHIELDS DEPLETED!";
        document.getElementById('final-score').innerText = `Final Score: ${score}`;
    }

    function resetGame() {
        currentQ = 0;
        score = 0;
        lives = 3;
        document.getElementById('score').innerText = score;
        document.getElementById('lives').innerText = lives;
        document.getElementById('screen-overlay').style.display = 'none';
        initQuestion();
    }

    initQuestion();
</script>

</body>
</html>
