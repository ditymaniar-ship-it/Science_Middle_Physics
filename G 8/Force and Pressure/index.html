<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nebula Quest: Force & Pressure</title>
    <style>
        body {
            margin: 0; padding: 0;
            background: radial-gradient(circle at center, #1b2735 0%, #090a0f 100%);
            height: 100vh; display: flex; justify-content: center; align-items: center;
            font-family: 'Comic Sans MS', sans-serif; overflow: hidden;
        }
        .stars {
            position: absolute; width: 200%; height: 200%;
            background: url('https://www.transparenttextures.com/patterns/stardust.png');
            animation: move 100s linear infinite; opacity: 0.4;
        }
        @keyframes move { from {transform:translate(0,0);} to {transform:translate(-50%,-50%);} }

        #container { position: relative; z-index: 10; width: 95%; max-width: 600px; }

        .bubble {
            background: white; border-radius: 40px; padding: 30px;
            border: 6px solid #00d2ff; box-shadow: 0 0 25px #00d2ff;
            text-align: center; position: relative; color: #333;
            max-height: 85vh; overflow-y: auto;
        }
        
        .q-image { width: 100%; max-height: 150px; object-fit: contain; margin: 10px 0; border-radius: 10px; }

        .btn {
            background: linear-gradient(to right, #00d2ff, #9d50bb);
            color: white; border: none; padding: 12px 30px;
            border-radius: 50px; cursor: pointer; font-size: 1.1rem;
            font-weight: bold; margin-top: 15px;
        }

        .opt {
            display: block; width: 100%; padding: 10px; margin: 8px 0;
            border: 2px solid #00d2ff; background: #f0faff;
            border-radius: 15px; cursor: pointer; font-weight: bold; font-size: 0.9rem;
        }
        .opt:hover { background: #00d2ff; color: white; }
        #stats { display: flex; justify-content: space-between; color: white; margin-bottom: 5px; font-weight: bold; }
        .type-tag { font-size: 0.8rem; color: #9d50bb; font-weight: bold; text-transform: uppercase; }
    </style>
</head>
<body>

<div class="stars"></div>

<div id="container">
    <div id="start-ui" class="bubble">
        <h2 style="color:#9d50bb; margin:0;">MISSION BRIEFING</h2>
        <p id="f-text" style="font-size:1.1rem; margin:15px 0;"></p>
        <div id="f-img-container"></div>
        <button class="btn" onclick="handleNextFact()">Next Fact ➔</button>
    </div>

    <div id="game-ui" style="display:none;">
        <div id="stats">
            <span id="q-label">Q: 1/5</span>
            <span id="hp">LIVES: ❤️❤️❤️</span>
        </div>
        <div class="bubble">
            <div id="q-type" class="type-tag"></div>
            <p id="q-text" style="font-size:1rem; margin:10px 0; font-weight:bold; text-align:left;"></p>
            <div id="options"></div>
            <p id="info" style="display:none; padding:10px; border-radius:10px; margin-top:10px; font-size:0.85rem;"></p>
            <button id="cont-btn" class="btn" style="display:none;" onclick="loadNext()">CONTINUE ➔</button>
        </div>
    </div>
</div>

<script>
    const facts = [
        {c: "Pressure depends on Area. Small area = Big Pressure!", img: ""},
        {c: "Liquid pressure pushes in all directions and gets stronger at the bottom!", img: "
"},
        {c: "Atmospheric pressure is the weight of air pressing down on us!", img: "

[Image of atmospheric pressure layers]
"}
    ];

    const bank = {
        understanding: [
            {q: "STORY: A student pushes a heavy box with 50N of force, but it stays perfectly still. Is a force being applied?", opts: ["No, force only exists during movement", "Yes, but it is balanced by friction", "The box has no mass"], ans: 1, why: "Balanced forces result in zero motion!"}
        ],
        application: [
            {q: "STORY: A circus performer must cross a muddy field. They have high heels and flat sneakers. Which should they wear to avoid sinking?", opts: ["High heels (better grip)", "Flat sneakers (higher area)", "Go barefoot"], ans: 1, why: "Flat sneakers spread the weight, reducing pressure on the mud."},
            {q: "STORY: A chef finds that their blunt knife won't slice a tomato, but a sharp one does easily with the same force. Why?", opts: ["Sharp knives have more force", "Sharp edge has a tiny area creating high pressure", "Blunt knives are heavier"], ans: 1, why: "Pressure = Force / Area. Tiny area = Huge cutting pressure!"},
            {q: "STORY: A porter is carrying a heavy 50kg box on his head. He places a round cloth ring (turbans) on his head first. Why?", opts: ["To keep his hair clean", "To increase contact area and lower pressure", "To balance the box better"], ans: 1, why: "The cloth ring spreads the load over a larger part of his head!"}
        ],
        critical: [
            {q: "STORY: You are designing a submarine to explore the Mariana Trench. Why must the bottom plates be 3x thicker than the top?", opts: ["To stop it from flipping", "Because water pressure is highest at the bottom", "To protect against sea monsters"], ans: 1, why: "Pressure increases with depth because more water weight is pressing down!"},
            {q: "STORY: You take a bag of chips from the beach up to a high mountain peak. Suddenly, the bag puffs up like a balloon! Why?", opts: ["The air inside got hot", "External air pressure decreased at high altitude", "Gravity pulled the bag open"], ans: 1, why: "Higher up, the outside air is thinner, so the inside air pushes OUT harder!"}
        ]
    };

    let fIdx = 0;
    let qIdx = 0;
    let hp = 3;
    let sessionQuestions = [];

    function handleNextFact() {
        if(fIdx < facts.length) {
            document.getElementById('f-text').innerText = facts[fIdx].c;
            document.getElementById('f-img-container').innerText = facts[fIdx].img;
            fIdx++;
        } else {
            startSession();
        }
    }

    function startSession() {
        // Pick 1 Understanding, 2 Application, 2 Critical
        sessionQuestions = [
            bank.understanding[0],
            ...bank.application.sort(() => 0.5 - Math.random()).slice(0, 2),
            ...bank.critical.sort(() => 0.5 - Math.random()).slice(0, 2)
        ];
        document.getElementById('start-ui').style.display = 'none';
        document.getElementById('game-ui').style.display = 'block';
        loadNext();
    }

    function loadNext() {
        if(qIdx >= 5 || hp <= 0) {
            const win = hp > 0;
            document.getElementById('game-ui').innerHTML = `<div class='bubble'><h2>${win ? '🏆 MISSION CLEAR' : '💀 FAILED'}</h2><p>${win ? 'You are a Force Master!' : 'Return to training.'}</p><button class='btn' onclick='location.reload()'>RESTART</button></div>`;
            return;
        }
        const data = sessionQuestions[qIdx];
        document.getElementById('q-label').innerText = `Q: ${qIdx+1}/5`;
        document.getElementById('q-type').innerText = (qIdx === 0) ? "Understanding" : (qIdx < 3 ? "Application" : "Critical Thinking");
        document.getElementById('q-text').innerText = data.q;
        document.getElementById('info').style.display = 'none';
        document.getElementById('cont-btn').style.display = 'none';
        
        const optBox = document.getElementById('options');
        optBox.innerHTML = '';
        data.opts.forEach((o, i) => {
            const b = document.createElement('button');
            b.className = 'opt';
            b.innerText = o;
            b.onclick = () => {
                const info = document.getElementById('info');
                info.style.display = 'block';
                if(i === data.ans) {
                    info.innerHTML = "✅ " + data.why;
                    info.style.background = "#d4edda";
                } else {
                    hp--;
                    document.getElementById('hp').innerText = "LIVES: " + "❤️".repeat(hp);
                    info.innerHTML = "❌ " + data.why;
                    info.style.background = "#f8d7da";
                }
                document.getElementById('cont-btn').style.display = 'inline-block';
                qIdx++;
            };
            optBox.appendChild(b);
        });
    }
    handleNextFact();
</script>
</body>
</html>
