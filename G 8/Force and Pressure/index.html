<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Force & Pressure: The Lab Challenge</title>
    <style>
        :root {
            --primary: #2c3e50;
            --accent: #3498db;
            --success: #27ae60;
            --danger: #e74c3c;
            --light: #ecf0f1;
        }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--primary); color: white; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        #game-box { background: white; color: #333; padding: 30px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); width: 90%; max-width: 600px; text-align: center; }
        .progress-bar { height: 10px; background: #ddd; border-radius: 5px; margin-bottom: 20px; overflow: hidden; }
        #progress { height: 100%; background: var(--accent); width: 0%; transition: 0.3s; }
        h1 { font-size: 1.5rem; color: var(--primary); }
        .question { font-size: 1.2rem; margin-bottom: 20px; font-weight: 600; }
        .options { display: grid; gap: 10px; }
        button { padding: 15px; border: 2px solid var(--accent); background: white; border-radius: 8px; cursor: pointer; font-size: 1rem; transition: 0.2s; }
        button:hover { background: var(--accent); color: white; }
        #feedback { margin-top: 20px; padding: 15px; border-radius: 8px; display: none; font-size: 0.9rem; line-height: 1.4; }
        .correct { background: #d4edda; color: #155724; display: block !important; }
        .wrong { background: #f8d7da; color: #721c24; display: block !important; }
        #next-btn { margin-top: 15px; background: var(--primary); color: white; border: none; padding: 10px 20px; display: none; }
    </style>
</head>
<body>

<div id="game-box">
    <div class="progress-bar"><div id="progress"></div></div>
    <h1 id="level-title">Level 1: The Foundation</h1>
    <p class="question" id="q-text">Loading question...</p>
    <div class="options" id="opt-container"></div>
    <div id="feedback"></div>
    <button id="next-btn" onclick="nextQuestion()">Next Level →</button>
</div>

<script>
    const questions = [
        {
            level: "Level 1: Understanding",
            q: "Which shoes should a performer wear to avoid sinking in soft mud?",
            options: ["High-heeled boots", "Flat-soled sneakers", "Barefoot"],
            correct: 1,
            fact: "<b>Why?</b> Pressure = Force / Area. Flat soles increase the area, spreading your weight out and reducing the pressure on the ground."
        },
        {
            level: "Level 2: Application",
            q: "You apply 10N of force to a sharp knife and a blunt knife. Why does the sharp one cut easier?",
            options: ["It creates more force", "The smaller area creates higher pressure", "It cancels out gravity"],
            correct: 1,
            fact: "<b>Why?</b> Pressure is inversely proportional to area ($P = F/A$). A tiny sharp edge concentrates the force into massive pressure!"
        },
        {
            level: "Level 3: Application",
            q: "Why are submarine hulls built thicker at the bottom than the top?",
            options: ["To balance the weight", "Because liquid pressure increases with depth", "To stop it from floating too fast"],
            correct: 1,
            fact: "<b>Why?</b> The deeper you go, the more water is piled on top of you. That extra weight increases the pressure significantly."
        },
        {
            level: "Level 4: Critical Thinking",
            q: "A bottle with holes is leaking water. If you drop it (free-fall), what happens to the leak?",
            options: ["It leaks faster", "It stops leaking entirely", "It leaks only from the top"],
            correct: 1,
            fact: "<b>Why?</b> In free-fall, the water and bottle fall at the same speed. Gravity no longer 'presses' the water against the walls."
        },
        {
            level: "Level 5: The Master Riddle",
            q: "Why does a bag of chips expand (puff up) at the top of a mountain?",
            options: ["The air inside gets hotter", "External atmospheric pressure decreases", "Gravity gets stronger"],
            correct: 1,
            fact: "<b>Why?</b> High up, the air is 'thinner' (lower pressure). The air inside the bag pushes out harder than the mountain air pushes back!"
        }
    ];

    let currentIdx = 0;

    function loadQ() {
        const q = questions[currentIdx];
        document.getElementById('level-title').innerText = q.level;
        document.getElementById('q-text').innerText = q.q;
        document.getElementById('feedback').style.display = 'none';
        document.getElementById('next-btn').style.display = 'none';
        document.getElementById('progress').style.width = (currentIdx / questions.length) * 100 + "%";
        
        const container = document.getElementById('opt-container');
        container.innerHTML = "";
        q.options.forEach((opt, i) => {
            const btn = document.createElement('button');
            btn.innerText = opt;
            btn.onclick = () => checkAnswer(i);
            container.appendChild(btn);
        });
    }

    function checkAnswer(choice) {
        const q = questions[currentIdx];
        const feedback = document.getElementById('feedback');
        const btns = document.querySelectorAll('#opt-container button');
        
        btns.forEach(b => b.disabled = true);

        if(choice === q.correct) {
            feedback.innerHTML = "✅ <b>Correct!</b> " + q.fact;
            feedback.className = "correct";
        } else {
            feedback.innerHTML = "❌ <b>Not quite.</b> " + q.fact;
            feedback.className = "wrong";
        }
