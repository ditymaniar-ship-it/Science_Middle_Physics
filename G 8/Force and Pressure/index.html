<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pressure Pilot: G8 Force Dynamics</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-deep: #020617;
            --accent-cyan: #22d3ee;
            --correct-green: #4ade80;
            --wrong-red: #f87171;
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            font-family: 'Roboto', sans-serif;
            background-color: var(--bg-deep);
            color: #f8fafc;
            overflow: hidden;
            display: flex; justify-content: center; align-items: center;
        }

        /* --- 1. DYNAMIC BACKGROUND --- */
        #bg-canvas {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 0;
        }

        /* --- 2. GAME PANEL --- */
        #game-container {
            width: 90%; max-width: 700px;
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(34, 211, 238, 0.3);
            border-radius: 20px;
            padding: 25px;
            z-index: 10;
            box-shadow: 0 0 40px rgba(0,0,0,0.5);
        }

        .stats-hud {
            display: flex; justify-content: space-between;
            font-family: 'Orbitron', sans-serif;
            color: var(--accent-cyan);
            margin-bottom: 10px;
        }

        #timer-bar {
            width: 100%; height: 6px; background: #1e293b;
            border-radius: 10px; margin-bottom: 20px; overflow: hidden;
        }

        #timer-fill {
            height: 100%; width: 100%; background: var(--accent-cyan);
            transition: width 0.1s linear;
        }

        /* --- 3. QUESTION AREA --- */
        .q-img {
            width: 100%; max-height: 180px; object-fit: contain;
            border-radius: 10px; margin-bottom: 15px; cursor: zoom-in;
            background: rgba(0,0,0,0.3); border: 1px solid #334155;
            transition: transform 0.2s;
        }
        .q-img:hover { transform: scale(1.02); }

        .scenario-text { font-size: 1.05rem; line-height: 1.5; color: #e2e8f0; margin-bottom: 10px; }
        .question-ask { font-weight: bold; font-size: 1.15rem; color: #fff; margin-bottom: 20px; }

        .options-grid { display: grid; gap: 10px; }
        .option {
            background: rgba(255,255,255,0.05); padding: 14px; border-radius: 8px;
            cursor: pointer; border: 1px solid rgba(255,255,255,0.1);
            transition: 0.2s; font-size: 0.95rem;
        }
        .option:hover { background: rgba(34, 211, 238, 0.15); border-color: var(--accent-cyan); }
        .correct { background: var(--correct-green) !important; color: #000 !important; font-weight: bold; }
        .wrong { background: var(--wrong-red) !important; color: #fff !important; }

        /* --- 4. LIGHTBOX (Enlarge Image) --- */
        #lightbox {
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95);
            z-index: 1000; justify-content: center; align-items: center; cursor: zoom-out;
        }
        #lightbox img { max-width: 90%; max-height: 90%; border: 2px solid var(--accent-cyan); }

        #overlay {
            display: none; position: absolute; inset: 0; background: #0f172a;
            border-radius: 20px; flex-direction: column; justify-content: center;
            align-items: center; z-index: 100; text-align: center;
        }
    </style>
</head>
<body>

<canvas id="bg-canvas"></canvas>

<div id="game-container">
    <div class="stats-hud">
        <span>SHIELDS: <span id="lives">3</span></span>
        <span>SCORE: <span id="score">0</span></span>
    </div>
    <div id="timer-bar"><div id="timer-fill"></div></div>

    <div id="game-content">
        <img id="main-img" class="q-img" onclick="enlargeImg(this.src)">
        <p id="scenario" class="scenario-text"></p>
        <p id="question" class="question-ask"></p>
        <div id="options" class="options-grid"></div>
    </div>

    <div id="overlay">
        <h1 id="status-text" style="font-family: 'Orbitron'; font-size: 2.5rem;"></h1>
        <p id="final-score" style="font-size: 1.2rem;"></p>
        <button onclick="startGame()" style="margin-top:20px; padding:12px 30px; cursor:pointer; font-family:'Orbitron'; background:var(--accent-cyan); border:none; border-radius:5px;">RESTART</button>
    </div>
</div>

<div id="lightbox" onclick="this.style.display='none'">
    <img id="lightbox-img">
</div>

<script>
    // --- PARTICLE BACKGROUND SYSTEM ---
    const canvas = document.getElementById('bg-canvas');
    const ctx = canvas.getContext('2d');
    let particles = [];
    let particleColor = 'rgba(34, 211, 238, 0.4)';

    function initParticles() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        particles = [];
        for(let i=0; i<100; i++) {
            particles.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                vx: Math.random() * 2 - 1,
                vy: Math.random() * 2 - 1,
                size: Math.random() * 2 + 1
            });
        }
    }

    function drawParticles() {
        ctx.fillStyle = 'rgba(2, 6, 23, 0.2)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = particleColor;
        particles.forEach(p => {
            p.x += p.vx; p.y += p.vy;
            if(p.x < 0 || p.x > canvas.width) p.vx *= -1;
            if(p.y < 0 || p.y > canvas.height) p.vy *= -1;
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.size, 0, Math.PI*2);
            ctx.fill();
        });
        requestAnimationFrame(drawParticles);
    }

    // --- GAME ENGINE ---
    const quiz = [
        {
            s: "An engineering team is designing a 'Desert Explorer' bus. Standard tires sliced into the sand, so they replaced them with wide 'balloon' tires.",
            q: "What is the primary physics reason for this change?",
            a: ["Increase friction for speed", "Increase surface area to reduce pressure", "Reduce total weight", "Help the tires dig deeper"],
            c: 1, img: "G 8/Force and pressure/desert_bus.jpg"
        },
        {
            s: "A carpenter sharpens a wooden dowel into a point. Suddenly, it enters the pre-drilled hole with the same amount of force.",
            q: "Why does the point make it enter easily?",
            a: ["Increased total force", "Reduced friction", "Smaller surface area creates higher pressure", "Chemical reaction"],
            c: 2, img: "G 8/Force and pressure/dowel.jpg"
        },
        {
            s: "A chip bag at sea level is moved to a mountain peak 3,000m high. The bag puffs up and looks like it might pop.",
            q: "What caused this expansion?",
            a: ["Inside air got colder", "Gravity is stronger", "External atmospheric pressure decreased", "Bag is air-tight"],
            c: 2, img: "G 8/Force and pressure/atmospheric_layers.jpg"
        },
        {
            s: "Look at the hydraulic system. A small force ($F_1$) on a small area ($A_1$) lifts a massive car.",
            q: "How is this possible?",
            a: ["Energy is created", "Volume increases", "Pressure is transmitted equally to a larger area", "Liquid moves faster"],
            c: 2, img: "G 8/Force and pressure/hydraulic_press.jpg"
        }
    ];

    let current = 0;
    let score = 0;
    let lives = 3;
    let timer;

    function startGame() {
        current = 0; score = 0; lives = 3;
        document.getElementById('overlay').style.display = 'none';
        updateStats();
        loadQ();
    }

    function loadQ() {
        if(current >= quiz.length) return end(true);
        const q = quiz[current];
        document.getElementById('scenario').innerText = q.s;
        document.getElementById('question').innerText = q.q;
        document.getElementById('main-img').src = q.img;
        
        const optCont = document.getElementById('options');
        optCont.innerHTML = '';
        q.a.forEach((opt, i) => {
            const b = document.createElement('div');
            b.className = 'option';
            b.innerText = opt;
            b.onclick = () => check(i);
            optCont.appendChild(b);
        });
        startTimer();
    }

    function check(i) {
        clearInterval(timer);
        const options = document.getElementsByClassName('option');
        if(i === quiz[current].c) {
            options[i].classList.add('correct');
            score += 100;
            particleColor = '#4ade80';
        } else {
            options[i].classList.add('wrong');
            options[quiz[current].c].classList.add('correct');
            lives--;
            particleColor = '#f87171';
        }
        setTimeout(() => {
            particleColor = 'rgba(34, 211, 238, 0.4)';
            current++;
            updateStats();
            if(lives > 0) loadQ(); else end(false);
        }, 1500);
    }

    function startTimer() {
        let width = 100;
        clearInterval(timer);
        timer = setInterval(() => {
            width -= 0.5;
            document.getElementById('timer-fill').style.width = width + '%';
            if(width <= 0) { lives--; check(-1); }
        }, 100);
    }

    function updateStats() {
        document.getElementById('score').innerText = score;
        document.getElementById('lives').innerText = lives;
    }

    function end(win) {
        document.getElementById('overlay').style.display = 'flex';
        document.getElementById('status-text').innerText = win ? "MISSION SUCCESS" : "MISSION FAILED";
        document.getElementById('final-score').innerText = "SCORE: " + score;
    }

    function enlargeImg(src) {
        document.getElementById('lightbox-img').src = src;
        document.getElementById('lightbox').style.display = 'flex';
    }

    window.onload = () => { initParticles(); drawParticles(); startGame(); };
    window.onresize = initParticles;
</script>
</body>
</html>
