<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pressure Pilot: Competency Challenge</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-deep: #020617;
            --accent-cyan: #22d3ee;
            --correct-green: #4ade80;
            --wrong-red: #f87171;
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            font-family: 'Roboto', sans-serif;
            background-color: var(--bg-deep);
            color: #f8fafc;
            overflow: hidden;
            display: flex; justify-content: center; align-items: center;
        }

        #bg-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; }

        #game-container {
            width: 90%; max-width: 750px;
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(34, 211, 238, 0.3);
            border-radius: 20px;
            padding: 30px;
            z-index: 10;
            box-shadow: 0 0 50px rgba(0,0,0,0.8);
        }

        .stats-hud {
            display: flex; justify-content: space-between;
            font-family: 'Orbitron', sans-serif;
            color: var(--accent-cyan);
            margin-bottom: 10px;
            letter-spacing: 2px;
        }

        #timer-bar { width: 100%; height: 8px; background: #1e293b; border-radius: 10px; margin-bottom: 25px; overflow: hidden; }
        #timer-fill { height: 100%; width: 100%; background: var(--accent-cyan); transition: width 0.1s linear; }

        .q-img {
            width: 100%; max-height: 220px; object-fit: contain;
            border-radius: 12px; margin-bottom: 20px; cursor: zoom-in;
            background: rgba(0,0,0,0.4); border: 1px solid #334155;
            transition: 0.3s;
        }
        .q-img:hover { border-color: var(--accent-cyan); transform: scale(1.01); }

        .scenario-text { font-size: 1.1rem; line-height: 1.6; color: #cbd5e1; margin-bottom: 15px; font-style: italic; }
        .question-ask { font-weight: bold; font-size: 1.25rem; color: #fff; margin-bottom: 25px; border-left: 4px solid var(--accent-cyan); padding-left: 15px; }

        .options-grid { display: grid; gap: 12px; }
        .option {
            background: rgba(255,255,255,0.04); padding: 16px; border-radius: 10px;
            cursor: pointer; border: 1px solid rgba(255,255,255,0.1);
            transition: 0.2s; font-size: 1rem;
        }
        .option:hover { background: rgba(34, 211, 238, 0.1); border-color: var(--accent-cyan); transform: translateX(8px); }
        .correct { background: var(--correct-green) !important; color: #000 !important; font-weight: 700; }
        .wrong { background: var(--wrong-red) !important; color: #fff !important; }

        #lightbox {
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95);
            z-index: 1000; justify-content: center; align-items: center; cursor: zoom-out;
        }
        #lightbox img { max-width: 95%; max-height: 95%; border: 3px solid var(--accent-cyan); border-radius: 10px; }

        #overlay {
            display: none; position: absolute; inset: 0; background: #0f172a;
            border-radius: 20px; flex-direction: column; justify-content: center;
            align-items: center; z-index: 100; text-align: center;
        }
    </style>
</head>
<body>

<canvas id="bg-canvas"></canvas>

<div id="game-container">
    <div class="stats-hud">
        <span>SHIELDS: <span id="lives">3</span></span>
        <span>SCORE: <span id="score">0</span></span>
    </div>
    <div id="timer-bar"><div id="timer-fill"></div></div>

    <div id="game-content">
        <img id="main-img" class="q-img" onclick="enlargeImg(this.src)">
        <p id="scenario" class="scenario-text"></p>
        <p id="question" class="question-ask"></p>
        <div id="options" class="options-grid"></div>
    </div>

    <div id="overlay">
        <h1 id="status-text" style="font-family: 'Orbitron'; font-size: 3rem; margin-bottom: 0;"></h1>
        <p id="final-score" style="font-size: 1.5rem; margin-top: 10px; color: var(--accent-cyan);"></p>
        <button onclick="startGame()" style="margin-top:30px; padding:15px 40px; cursor:pointer; font-family:'Orbitron'; background:var(--accent-cyan); color:#000; font-weight:bold; border:none; border-radius:5px; box-shadow: 0 0 15px var(--accent-cyan);">REINITIALIZE</button>
    </div>
</div>

<div id="lightbox" onclick="this.style.display='none'">
    <img id="lightbox-img">
</div>

<script>
    // --- PARTICLE BACKGROUND ---
    const canvas = document.getElementById('bg-canvas');
    const ctx = canvas.getContext('2d');
    let particles = [];
    let pColor = 'rgba(34, 211, 238, 0.4)';

    function initParticles() {
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        particles = [];
        for(let i=0; i<120; i++) {
            particles.push({
                x: Math.random() * canvas.width, y: Math.random() * canvas.height,
                vx: Math.random() * 1.5 - 0.75, vy: Math.random() * 1.5 - 0.75,
                size: Math.random() * 2 + 1
            });
        }
    }

    function drawParticles() {
        ctx.fillStyle = 'rgba(2, 6, 23, 0.15)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = pColor;
        particles.forEach(p => {
            p.x += p.vx; p.y += p.vy;
            if(p.x < 0 || p.x > canvas.width) p.vx *= -1;
            if(p.y < 0 || p.y > canvas.height) p.vy *= -1;
            ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI*2); ctx.fill();
        });
        requestAnimationFrame(drawParticles);
    }

    // --- COMPETENCY QUIZ DATA ---
    const quiz = [
        {
            s: "LEVEL 1: Engineers notice that a sharp knife slices a tomato easily, while a dull knife requires much more force to achieve the same cut.",
            q: "Why does the sharpness of the edge change the effort required?",
            a: ["A sharp edge increases the total force applied by the hand", "A smaller surface area at the edge concentrates force into higher pressure", "Sharper metal has less friction with the tomato skin", "The dull knife loses energy through heat"],
            c: 1, img: "G%208/Force%20and%20Pressure/knife_edge.jpg"
        },
        {
            s: "LEVEL 2: In hydroelectric dams, engineers always design the concrete base to be much thicker than the top section.",
            q: "What is the specific competency reason for this 'thick-bottom' design?",
            a: ["To support the weight of the birds landing on top", "Liquid pressure is highest at the surface", "Liquid pressure increases with depth, requiring a stronger base to resist force", "To prevent fish from swimming under the dam"],
            c: 2, img: "G%208/Force%20and%20Pressure/dam_design.jpg"
        },
        {
            s: "LEVEL 3: A metal soda can is heated with a little water until it steams, then flipped into ice water. It crushes instantly.",
            q: "Competency Check: Which force is responsible for crushing the can?",
            a: ["The cold water hitting the metal", "The sudden increase in internal steam pressure", "The external atmospheric pressure, which is now higher than the internal pressure", "Gravity pulling the top of the can down"],
            c: 2, img: "G%208/Force%20and%20Pressure/can_crush.jpg"
        },
        {
            s: "LEVEL 4: A hydraulic lift uses a small piston to lift a 1,500kg car on a much larger piston. This is based on Pascal's Law.",
            q: "How does the pressure ($P$) behave in this closed system?",
            a: ["Pressure is higher at the small piston", "Pressure is transmitted equally in all directions throughout the fluid", "Pressure disappears when the car starts to move", "The larger piston creates its own pressure"],
            c: 1, img: "G%208/Force%20and%20Pressure/hydraulic_lift.jpg"
        }
    ];

    let current = 0; let score = 0; let lives = 3; let timer;

    function startGame() {
        current = 0; score = 0; lives = 3;
        document.getElementById('overlay').style.display = 'none';
        updateStats(); loadQ();
    }

    function loadQ() {
        if(current >= quiz.length) return end(true);
        const q = quiz[current];
        document.getElementById('scenario').innerText = q.s;
        document.getElementById('question').innerText = q.q;
        
        const img = document.getElementById('main-img');
        img.src = q.img;
        img.onerror = () => img.style.display = 'none';
        img.onload = () => img.style.display = 'block';

        const optCont = document.getElementById('options');
        optCont.innerHTML = '';
        q.a.forEach((opt, i) => {
            const b = document.createElement('div');
            b.className = 'option';
            b.innerText = opt;
            b.onclick = () => check(i);
            optCont.appendChild(b);
        });
        startTimer();
    }

    function check(i) {
        clearInterval(timer);
        const options = document.getElementsByClassName('option');
        if(i === quiz[current].c) {
            options[i].classList.add('correct');
            score += 200; pColor = '#4ade80';
        } else {
            if(i !== -1) options[i].classList.add('wrong');
            options[quiz[current].c].classList.add('correct');
            lives--; pColor = '#f87171';
        }
        setTimeout(() => {
            pColor = 'rgba(34, 211, 238, 0.4)'; current++; updateStats();
            if(lives > 0) loadQ(); else end(false);
        }, 2000);
    }

    function startTimer() {
        let w = 100; clearInterval(timer);
        timer = setInterval(() => {
            w -= 0.4; document.getElementById('timer-fill').style.width = w + '%';
            if(w <= 0) { clearInterval(timer); check(-1); }
        }, 100);
    }

    function updateStats() {
        document.getElementById('score').innerText = score;
        document.getElementById('lives').innerText = "❤️".repeat(lives);
    }

    function end(win) {
        document.getElementById('overlay').style.display = 'flex';
        document.getElementById('status-text').innerText = win ? "MISSION SUCCESS" : "CORE FAILURE";
        document.getElementById('final-score').innerText = "FINAL COMPETENCY SCORE: " + score;
    }

    function enlargeImg(src) {
        document.getElementById('lightbox-img').src = src;
        document.getElementById('lightbox').style.display = 'flex';
    }

    window.onload = () => { initParticles(); drawParticles(); startGame(); };
</script>
</body>
</html>
