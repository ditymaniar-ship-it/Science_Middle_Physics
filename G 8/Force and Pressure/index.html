<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Force & Pressure: Nebula Quest</title>
    <style>
        :root {
            --bubble-bg: rgba(255, 255, 255, 0.9);
            --neon-blue: #00d2ff;
            --neon-purple: #9d50bb;
            --space-dark: #050510;
        }

        /* Animated Space Background */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Comic Sans MS', cursive, sans-serif;
            background: var(--space-dark);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            background: radial-gradient(circle at center, #1b2735 0%, #090a0f 100%);
        }

        /* Moving Stars Effect */
        body::before {
            content: "";
            position: absolute;
            width: 200%;
            height: 200%;
            background-image: radial-gradient(white 1px, transparent 1px);
            background-size: 50px 50px;
            animation: moveStars 100s linear infinite;
            opacity: 0.3;
        }

        @keyframes moveStars {
            from { transform: translate(0, 0); }
            to { transform: translate(-50%, -50%); }
        }

        #game-container {
            position: relative;
            z-index: 10;
            width: 90%;
            max-width: 600px;
            perspective: 1000px;
        }

        /* The Bubble/Cloud Style */
        .bubble {
            background: var(--bubble-bg);
            border-radius: 50px 50px 50px 5px; /* Cloud-like shape */
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,210,255,0.3);
            border: 4px solid var(--neon-blue);
            color: #333;
            text-align: center;
            animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
        }

        /* Bubble Tail */
        .bubble::after {
            content: '';
            position: absolute;
            bottom: -20px;
            left: 30px;
            border-width: 20px 20px 0;
            border-style: solid;
            border-color: var(--neon-blue) transparent;
        }

        @keyframes popIn {
            0% { transform: scale(0.5); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        h2 { color: var(--neon-purple); margin-top: 0; text-transform: uppercase; font-size: 1.5rem; }

        .fact-text { font-size: 1.2rem; line-height: 1.4; margin: 20px 0; font-weight: bold; }

        /* Game Buttons */
        .btn {
            background: linear-gradient(45deg, var(--neon-blue), var(--neon-purple));
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 1.2rem;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            transition: 0.3s;
        }

        .btn:hover { transform: scale(1.1); box-shadow: 0 0 20px var(--neon-blue); }

        /* Progress Bar */
        .progress-box { width: 100%; height: 10px; background: rgba(255,255,255,0.2); border-radius: 5px; margin-bottom: 20px; }
        #progress-fill { height: 100%; background: var(--neon-blue); width: 0%; border-radius: 5px; transition: 0.5s; }

        .opt-grid { display: grid; gap: 10px; margin-top: 20px; }
        .opt-btn { 
            background: white; border: 2px solid var(--neon-blue); padding: 12px; 
            border-radius: 15px; cursor: pointer; font-family: inherit; font-weight: bold;
            transition: 0.2s; text-align: left;
        }
        .opt-btn:hover { background: #e0f7ff; }

        .header-stats { display: flex; justify-content: space-between; color: white; margin-bottom: 10px; font-weight: bold; }
    </style>
</head>
<body>

<div id="game-container">
    <div id="intro-screen" class="bubble">
        <h2 id="fact-title">🚀 Lab Fact #1</h2>
        <p class="fact-text" id="fact-content">Force is a push or pull. Balanced forces mean no movement!</p>
        <button class="btn" id="fact-btn" onclick="nextFact()">Next Fact ➔</button>
    </div>

    <div id="game-screen" style="display:none;">
        <div class="header-stats">
            <span id="q-count">Q: 1/10</span>
            <span id="lives">LIVES: ❤️❤️❤️</span>
        </div>
        <div class="progress-box"><div id="progress-fill"></div></div>
        
        <div class="bubble">
            <h2 id="cat-title">Application</h2>
            <p id="q-text" class="fact-text">Loading...</p>
            <div id="options" class="opt-grid"></div>
            <p id="feedback" style="display:none; font-size: 0.9rem; padding: 10px; border-radius: 10px; margin-top: 10px;"></p>
            <button id="continue-btn" class="btn" style="display:none; margin-top: 15px;" onclick="loadNextQ()">Continue ➔</button>
        </div>
    </div>
</div>

<script>
    const facts = [
        { t: "🚀 Lab Fact #1", c: "Force is a push or pull. Balanced forces mean no movement!" },
        { t: "☁️ Lab Fact #2", c: "Pressure = Force ÷ Area. Smaller area creates HUGE pressure!" },
        { t: "🌊 Lab Fact #3", c: "Liquid pressure increases the deeper you go. Submarines must be thick!" }
    ];

    const bank = [
        { cat: "Understanding", q: "A student pushes a heavy box but it doesn't move. Is force applied?", opts: ["Yes, but it's balanced by friction", "No force is present", "Gravity is pushing it sideways"], correct: 0, f: "Static friction cancels the push!" },
        { cat: "Application", q: "Why do camels have broad feet?", opts: ["To look tall", "To increase area and reduce pressure on sand", "To walk faster"], correct: 1, f: "Broad feet prevent sinking in soft sand." },
        { cat: "HOTS", q: "Why are dam walls thicker at the bottom?", opts: ["To save bricks", "Because water pressure increases with depth", "To stop fish"], correct: 1, f: "Water weight creates massive pressure at the base." },
        { cat: "Application", q: "A sharp knife cuts better because:", opts: ["It is heavier", "Small area creates high pressure", "It has more force"], correct: 1, f: "Area is tiny, so pressure is giant!" },
        { cat: "HOTS", q: "What happens to liquids if atmospheric pressure disappeared?", opts: ["They freeze", "They boil/evaporate instantly", "They turn blue"], correct: 1, f: "Air pressure 'holds' liquid molecules together." }
    ];

    let currentFactIdx = 0;
    let currentQIdx = 0;
    let lives = 3;
    let activeBank = [];

    function nextFact() {
        currentFactIdx++;
        if(currentFactIdx < facts.length) {
            document.getElementById('fact-title').innerText = facts[currentFactIdx].t;
            document.getElementById('fact-content').innerText = facts[currentFactIdx].c;
            if(currentFactIdx === facts.length - 1) document.getElementById('fact-btn').innerText = "Launch Mission! 🚀";
        } else {
            document.getElementById('intro-screen').style.display = 'none';
            document.getElementById('game-screen').style.display = 'block';
            activeBank = bank.sort(() => 0.5 - Math.random()).slice(0, 5);
            showQuestion();
        }
    }

    function showQuestion() {
        const q = activeBank[currentQIdx];
        document.getElementById('q-count').innerText = `Q: ${currentQIdx + 1}/5`;
        document.getElementById('cat-title').innerText = q.cat;
        document.getElementById('q-text').innerText = q.q;
        document.getElementById('feedback').style.display = 'none';
        document.getElementById('continue-btn').style.display = 'none';
        document.getElementById('progress-fill').style.width = (currentQIdx / 5 * 100) + "%";
        
        const optContainer = document.getElementById('options');
        optContainer.innerHTML = '';
        q.opts.forEach((opt, i) => {
            const b = document.createElement('button');
            b.className = 'opt-btn';
            b.innerText = opt;
            b.onclick = () => checkAns(i);
            optContainer.appendChild(b);
        });
    }

    function checkAns(idx) {
        const q = activeBank[currentQIdx];
        const feedback = document.getElementById('feedback');
        document.querySelectorAll('.opt-btn').forEach(b => b.disabled = true);
        
        if(idx === q.correct) {
            feedback.innerHTML = "🌟 <b>Correct!</b> " + q.f;
            feedback.style.background = "#d4edda";
            feedback.style.color = "#155724";
        } else {
            lives--;
            document.getElementById('lives').innerText = "LIVES: " + "❤️".repeat(lives) + "🖤".repeat(3-lives);
            feedback.innerHTML = "❌ <b>Wrong!</b> " + q.f;
            feedback.style.background = "#f8d7da";
            feedback.style.color = "#721c24";
            if(lives <= 0) { gameOver(); return; }
        }
        feedback.style.display = 'block';
        document.getElementById('continue-btn').style.display = 'inline-block';
    }

    function loadNextQ() {
        currentQIdx++;
        if(currentQIdx < activeBank.length) showQuestion();
        else winGame();
    }

    function winGame() {
        document.getElementById('game-screen').innerHTML = `<div class="bubble"><h2>🏆 MISSION SUCCESS!</h2><p>You are a Physics Master!</p><button class="btn" onclick="location.reload()">PLAY AGAIN</button></div>`;
    }

    function gameOver() {
        document.getElementById('game-screen').innerHTML = `<div class="bubble"><h2>💀 SYSTEM FAILURE</h2><p>You ran out of lives!</p><button class="btn" onclick="location.reload()">RESTART</button></div>`;
    }
</script>
</body>
</html>
