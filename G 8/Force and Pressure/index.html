<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Force & Pressure: Nebula Quest</title>
    <style>
        :root {
            --neon-blue: #00d2ff;
            --neon-purple: #9d50bb;
            --bg-dark: #050510;
        }

        /* 🌌 ANIMATED SPACE BACKGROUND */
        body {
            margin: 0; padding: 0;
            font-family: 'Comic Sans MS', 'Chalkboard SE', sans-serif;
            background: radial-gradient(circle at center, #1b2735 0%, #090a0f 100%);
            height: 100vh; display: flex; justify-content: center; align-items: center;
            overflow: hidden; color: white;
        }

        /* Moving Starfield */
        .stars {
            position: absolute; top: 0; left: 0; width: 200%; height: 200%;
            background: url('https://www.transparenttextures.com/patterns/stardust.png');
            animation: move 100s linear infinite; opacity: 0.5; z-index: 1;
        }
        @keyframes move { from {transform: translate(0,0);} to {transform: translate(-50%, -50%);} }

        #game-container { position: relative; z-index: 10; width: 90%; max-width: 600px; }

        /* ☁️ CLOUD BUBBLE DESIGN */
        .cloud-bubble {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 50px;
            padding: 40px;
            color: #333;
            box-shadow: 0 0 30px var(--neon-blue);
            border: 5px solid var(--neon-blue);
            text-align: center;
            position: relative;
            animation: pop 0.4s ease-out;
        }
        .cloud-bubble::after {
            content: ''; position: absolute; bottom: -30px; left: 50px;
            border-width: 30px 30px 0; border-style: solid;
            border-color: var(--neon-blue) transparent;
        }

        @keyframes pop { 0% {transform: scale(0.8); opacity: 0;} 100% {transform: scale(1); opacity: 1;} }

        h2 { color: var(--neon-purple); margin: 0 0 15px 0; text-transform: uppercase; }
        .main-text { font-size: 1.2rem; font-weight: bold; margin-bottom: 20px; line-height: 1.4; }

        /* 🔘 BUTTONS */
        .btn {
            background: linear-gradient(45deg, var(--neon-blue), var(--neon-purple));
            color: white; border: none; padding: 15px 30px;
            font-size: 1.1rem; border-radius: 50px; cursor: pointer;
            font-weight: bold; transition: 0.3s; margin-top: 10px;
        }
        .btn:hover { transform: scale(1.1); box-shadow: 0 0 15px var(--neon-blue); }

        .opt-grid { display: grid; gap: 10px; margin-top: 15px; }
        .opt-btn {
            background: #f0f8ff; border: 2px solid var(--neon-blue);
            padding: 12px; border-radius: 15px; cursor: pointer;
            font-weight: bold; font-family: inherit; transition: 0.2s;
        }
        .opt-btn:hover { background: var(--neon-blue); color: white; }

        #stats { display: flex; justify-content: space-between; margin-bottom: 10px; font-weight: bold; }
        #feedback { margin-top: 15px; padding: 10px; border-radius: 10px; display: none; font-weight: bold; }
    </style>
</head>
<body>

<div class="stars"></div>

<div id="game-container">
    <div id="intro-box" class="cloud-bubble">
        <h2 id="fact-title">🚀 MISSION FACT #1</h2>
        <p id="fact-text" class="main-text">Force is a push or pull. If forces are equal on both sides, nothing moves!</p>
        <button class="btn" onclick="nextFact()">Next Fact ➔</button>
    </div>

    <div id="game-box" style="display:none;">
        <div id="stats">
            <span id="q-num">Question: 1/5</span>
            <span id="lives-count">LIVES: ❤️❤️❤️</span>
        </div>
        <div class="cloud-bubble">
            <h2 id="cat-label">Application</h2>
            <p id="q-text" class="main-text">Question text goes here...</p>
            <div id="options-area" class="opt-grid"></div>
            <div id="feedback"></div>
            <button id="next-q-btn" class="btn" style="display:none;" onclick="loadQuestion()">CONTINUE ➔</button>
        </div>
    </div>
</div>

<script>
    // 🧠 DATA BANK
    const introFacts = [
        { t: "🚀 MISSION FACT #1", c: "Force is a push or pull. If forces are equal on both sides, nothing moves!" },
        { t: "☁️ MISSION FACT #2", c: "Pressure = Force ÷ Area. Small points (like nails) create HUGE pressure!" },
        { t: "🌊 MISSION FACT #3", c: "Liquid pressure gets stronger the deeper you go. Submarines must be tough!" }
    ];

    const quizBank = [
        { c: "Understanding", q: "A student pushes a heavy box but it doesn't move. Why?", o: ["No force applied", "Balanced by friction", "Gravity is sideways"], a: 1, f: "Friction cancels your push!" },
        { c: "Application", q: "Why do camels have broad feet?", o: ["To run fast", "To reduce pressure on sand", "To look tall"], a: 1, f: "Large area = Low pressure!" },
        { c: "HOTS", q: "Why are dam walls thicker at the bottom?", o: ["To save stone", "Water pressure increases with depth", "For fish"], a: 1, f: "Deep water is very heavy!" },
        { c: "Application", q: "A sharp knife cuts better than a blunt one because:", o: ["It's heavier", "Small area = High pressure", "It's magnetic"], a: 1, f: "The thin edge concentrates all the force!" },
        { c: "HOTS", q: "What happens to water if air pressure disappeared?", o: ["It freezes", "It boils/evaporates", "It turns green"], a: 1, f: "Air pressure holds water together!" }
    ];

    let factIdx = 0;
    let quizIdx = 0;
    let lives = 3;

    function nextFact() {
        factIdx++;
        if(factIdx < introFacts.length) {
            document.getElementById('fact-title').innerText = introFacts[factIdx].t;
            document.getElementById('fact-text').innerText = introFacts[factIdx].c;
        } else {
            document.getElementById('intro-box').style.display = 'none';
            document.getElementById('game-box').style.display = 'block';
            loadQuestion();
        }
    }

    function loadQuestion() {
        if(quizIdx >= 5) {
            document.getElementById('game-box').innerHTML = "<div class='cloud-bubble'><h2>🏆 SUCCESS!</h2><p class='main-text'>Mission Complete! You are a Physics Pro!</p><button class='btn' onclick='location.reload()'>RESTART</button></div>";
            return;
        }
        
        const data = quizBank[quizIdx];
        document.getElementById('q-num').innerText = `Question: ${quizIdx + 1}/5`;
        document.getElementById('cat-label').innerText = data.c;
        document.getElementById('q-text').innerText = data.q;
        document.getElementById('feedback').style.display = 'none';
        document.getElementById('next-q-btn').style.display = 'none';
        
        const area = document.getElementById('options-area');
        area.innerHTML = '';
        data.o.forEach((opt, i) => {
            const b = document.createElement('button');
            b.className = 'opt-btn';
            b.innerText = opt;
            b.onclick = () => check(i);
            area.appendChild(b);
        });
    }

    function check(idx) {
        const data = quizBank[quizIdx];
        const fb = document.getElementById('feedback');
        document.querySelectorAll('.opt-btn').forEach(b => b.disabled = true);

        fb.style.display = 'block';
        if(idx === data.a) {
            fb.innerHTML = "✅ CORRECT! " + data.f;
            fb.style.background = "#d4edda";
            quizIdx++;
        } else {
            lives--;
            document.getElementById('lives-count').innerText = "LIVES: " + "❤️".repeat(lives);
            fb.innerHTML = "❌ WRONG! " + data.f;
            fb.style.background = "#f8d7da";
            if(lives <= 0) {
                document.getElementById('game-box').innerHTML = "<div class='cloud-bubble'><h2>💀 FAILED</h2><p class='main-text'>Out of lives! Return to base.</p><button class='btn' onclick='location.reload()'>RETRY</button></div>";
                return;
            }
            quizIdx++;
        }
        document.getElementById('next-q-btn').style.display = 'inline-block';
    }
</script>
</body>
</html>
