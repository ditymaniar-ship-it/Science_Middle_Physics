<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nebula Quest: Force & Pressure</title>
    <style>
        body {
            margin: 0; padding: 0;
            background: radial-gradient(circle at center, #1b2735 0%, #090a0f 100%);
            height: 100vh; display: flex; justify-content: center; align-items: center;
            font-family: 'Comic Sans MS', sans-serif; overflow: hidden;
        }
        .stars {
            position: absolute; width: 200%; height: 200%;
            background: url('https://www.transparenttextures.com/patterns/stardust.png');
            animation: move 100s linear infinite; opacity: 0.4;
        }
        @keyframes move { from {transform:translate(0,0);} to {transform:translate(-50%,-50%);} }

        #container { position: relative; z-index: 10; width: 95%; max-width: 600px; }

        .bubble {
            background: white; border-radius: 40px; padding: 30px;
            border: 6px solid #00d2ff; box-shadow: 0 0 25px #00d2ff;
            text-align: center; position: relative; color: #333;
        }
        
        .q-image { width: 100%; max-height: 180px; object-fit: contain; margin: 15px 0; border-radius: 15px; border: 2px solid #eee; }

        .btn {
            background: linear-gradient(to right, #00d2ff, #9d50bb);
            color: white; border: none; padding: 15px 40px;
            border-radius: 50px; cursor: pointer; font-size: 1.2rem;
            font-weight: bold; margin-top: 15px; transition: 0.3s;
        }
        .btn:hover { transform: scale(1.1); box-shadow: 0 0 15px #00d2ff; }

        .opt {
            display: block; width: 100%; padding: 12px; margin: 10px 0;
            border: 2px solid #00d2ff; background: #f0faff;
            border-radius: 15px; cursor: pointer; font-weight: bold; font-size: 1rem;
        }
        .opt:hover { background: #00d2ff; color: white; }
        #stats { display: flex; justify-content: space-between; color: white; margin-bottom: 8px; font-weight: bold; }
        .type-tag { font-size: 0.9rem; color: #9d50bb; font-weight: bold; text-transform: uppercase; margin-bottom: 5px; }
    </style>
</head>
<body>

<div class="stars"></div>

<div id="container">
    <div id="start-ui" class="bubble">
        <h2 id="f-head" style="color:#9d50bb; margin:0;">MISSION BRIEFING</h2>
        <p id="f-text" style="font-size:1.1rem; margin:15px 0; font-weight:bold;"></p>
        <img id="f-img" class="q-image" src="" style="display:none;">
        <button id="fact-next-btn" class="btn" onclick="handleNextFact()">Start Briefing ➔</button>
    </div>

    <div id="game-ui" style="display:none;">
        <div id="stats">
            <span id="q-label">Q: 1/5</span>
            <span id="hp">LIVES: ❤️❤️❤️</span>
        </div>
        <div class="bubble">
            <div id="q-type" class="type-tag"></div>
            <p id="q-text" style="font-size:1.1rem; margin:10px 0; font-weight:bold; text-align:left;"></p>
            <div id="options"></div>
            <div id="info" style="display:none; padding:12px; border-radius:15px; margin-top:15px; font-size:0.9rem; font-weight:bold;"></div>
            <button id="cont-btn" class="btn" style="display:none;" onclick="loadNext()">CONTINUE ➔</button>
        </div>
    </div>
</div>

<script>
    // 🎨 FACT DATA WITH REAL DIAGRAMS
    const facts = [
        {c: "Pressure depends on Area. Small area = HUGE Pressure!", img: "https://cdn.pixabay.com/photo/2014/04/03/10/01/thumb-309650_1280.png"},
        {c: "Liquid pressure pushes harder the deeper you dive!", img: "https://cdn.pixabay.com/photo/2017/01/31/15/33/submarine-2025117_1280.png"},
        {c: "Air pressure is the weight of miles of air pressing on you!", img: "https://cdn.pixabay.com/photo/2012/04/18/14/54/clouds-37255_1280.png"}
    ];

    // 🧠 STORY-BASED QUESTION BANK
    const bank = {
        understanding: [
            {q: "STORY: A student pushes a heavy box with 50N of force, but it stays perfectly still. Why isn't it moving?", opts: ["Force doesn't exist without motion", "The force is balanced by static friction", "The floor has no pressure"], ans: 1, why: "Balanced forces mean no change in motion!"}
        ],
        application: [
            {q: "STORY: A chef finds that their blunt knife won't slice a tomato, but a sharp one does it easily. What's the secret?", opts: ["Sharp knives have 'Magic Force'", "The tiny edge area creates huge pressure", "Blunt knives are too light"], ans: 1, why: "Pressure = Force / Area. A tiny edge makes huge pressure!"},
            {q: "STORY: A porter carries a heavy 50kg box but puts a round cloth ring on his head first. How does this help?", opts: ["It makes the box lighter", "It increases contact area to lower pressure", "It balances his hair"], ans: 1, why: "More area = Less pressure on his head!"}
        ],
        critical: [
            {q: "STORY: Engineers building a deep-sea sub make the bottom plates much thicker than the top ones. Why?", opts: ["To keep it from floating", "Because water pressure is highest at the bottom", "To protect from sharks"], ans: 1, why: "Water pressure increases with depth!"},
            {q: "STORY: You take a bag of chips from the beach up to a high mountain peak. The bag suddenly puffs up! Why?", opts: ["The air inside got hot", "External air pressure is lower at high altitudes", "Gravity pulled the bag"], ans: 1, why: "Thinner air outside lets the inside air push out more!"}
        ]
    };

    let fIdx = 0;
    let qIdx = 0;
    let hp = 3;
    let sessionQs = [];

    // 🚀 FIX: NEXT FACT LOGIC
    function handleNextFact() {
        if(fIdx < facts.length) {
            document.getElementById('f-head').innerText = "BRIEFING: " + (fIdx + 1) + "/3";
            document.getElementById('f-text').innerText = facts[fIdx].c;
            const img = document.getElementById('f-img');
            img.src = facts[fIdx].img;
            img.style.display = 'block';
            document.getElementById('fact-next-btn').innerText = (fIdx === facts.length - 1) ? "Launch Mission! 🚀" : "Next Fact ➔";
            fIdx++;
        } else {
            startSession();
        }
    }

    function startSession() {
        sessionQs = [
            bank.understanding[0],
            ...bank.application.sort(() => 0.5 - Math.random()).slice(0, 2),
            ...bank.critical.sort(() => 0.5 - Math.random()).slice(0, 2)
        ];
        document.getElementById('start-ui').style.display = 'none';
        document.getElementById('game-ui').style.display = 'block';
        loadNext();
    }

    function loadNext() {
        if(qIdx >= 5) {
            endGame(true);
            return;
        }
        const data = sessionQs[qIdx];
        document.getElementById('q-label').innerText = `Q: ${qIdx+1}/5`;
        document.getElementById('q-type').innerText = (qIdx === 0) ? "Understanding" : (qIdx < 3 ? "Application" : "Critical Thinking");
        document.getElementById('q-text').innerText = data.q;
        document.getElementById('info').style.display = 'none';
        document.getElementById('cont-btn').style.display = 'none';
        
        const optBox = document.getElementById('options');
        optBox.innerHTML = '';
        data.opts.forEach((o, i) => {
            const b = document.createElement('button');
            b.className = 'opt';
            b.innerText = o;
            b.onclick = () => {
                document.querySelectorAll('.opt').forEach(btn => btn.disabled = true);
                const info = document.getElementById('info');
                info.style.display = 'block';
                if(i === data.ans) {
                    info.innerHTML = "✅ CORRECT! " + data.why;
                    info.style.background = "#d4edda";
                    info.style.color = "#155724";
                } else {
                    hp--;
                    document.getElementById('hp').innerText = "LIVES: " + "❤️".repeat(hp);
                    info.innerHTML = "❌ OOPS! " + data.why;
                    info.style.background = "#f8d7da";
                    info.style.color = "#721c24";
                    if(hp <= 0) { endGame(false); return; }
                }
                document.getElementById('cont-btn').style.display = 'inline-block';
                qIdx++;
            };
            optBox.appendChild(b);
        });
    }

    function endGame(win) {
        document.getElementById('game-ui').innerHTML = `
            <div class='bubble'>
                <h2>${win ? '🏆 MISSION CLEAR' : '💀 SYSTEM CRASH'}</h2>
                <p style='font-weight:bold;'>${win ? 'You are a certified Force & Pressure Master!' : 'You ran out of lives. Return to base for retraining.'}</p>
                <button class='btn' onclick='location.reload()'>RESTART MISSION</button>
            </div>`;
    }

    // Initial trigger
    handleNextFact();
</script>
</body>
</html>
