<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nebula Quest: Force & Pressure</title>
    <style>
        body {
            margin: 0; padding: 0;
            background: radial-gradient(circle at center, #1b2735 0%, #090a0f 100%);
            height: 100vh; display: flex; justify-content: center; align-items: center;
            font-family: 'Segoe UI', sans-serif; overflow: hidden;
        }
        .stars {
            position: absolute; width: 200%; height: 200%;
            background: url('https://www.transparenttextures.com/patterns/stardust.png');
            animation: move 120s linear infinite; opacity: 0.3;
        }
        @keyframes move { from {transform:translate(0,0);} to {transform:translate(-50%,-50%);} }

        #container { position: relative; z-index: 10; width: 95%; max-width: 550px; }

        .bubble {
            background: white; border-radius: 30px; padding: 25px;
            border: 5px solid #00d2ff; box-shadow: 0 0 20px rgba(0,210,255,0.5);
            text-align: center; color: #333;
        }
        
        .visual-aid { 
            width: 100%; max-height: 200px; object-fit: contain; 
            margin: 15px 0; border-radius: 12px; background: #fff;
        }

        .btn {
            background: linear-gradient(135deg, #00d2ff, #9d50bb);
            color: white; border: none; padding: 14px 35px;
            border-radius: 50px; cursor: pointer; font-size: 1.1rem;
            font-weight: bold; margin-top: 10px; transition: 0.3s;
        }
        .btn:hover { transform: scale(1.05); box-shadow: 0 0 15px #00d2ff; }

        .opt {
            display: block; width: 100%; padding: 12px; margin: 8px 0;
            border: 2px solid #00d2ff; background: #f0faff;
            border-radius: 12px; cursor: pointer; font-weight: 600; text-align: left;
        }
        .opt:hover { background: #e0f7ff; }
        
        #stats { display: flex; justify-content: space-between; color: white; margin-bottom: 8px; font-weight: bold; }
        .tag { font-size: 0.8rem; color: #9d50bb; font-weight: bold; text-transform: uppercase; margin-bottom: 5px; }
    </style>
</head>
<body>

<div class="stars"></div>

<div id="container">
    <div id="intro-ui" class="bubble">
        <h2 id="step-title" style="color:#9d50bb; margin:0;">MISSION BRIEFING</h2>
        <img id="step-img" class="visual-aid" src="" alt="Physics Concept">
        <p id="step-text" style="font-size:1.1rem; line-height:1.4; font-weight:500;"></p>
        <button id="next-fact-btn" class="btn" onclick="showNextFact()">Start Briefing ➔</button>
    </div>

    <div id="quiz-ui" style="display:none;">
        <div id="stats">
            <span id="q-idx">Progress: 1/5</span>
            <span id="lives">LIVES: ❤️❤️❤️</span>
        </div>
        <div class="bubble">
            <div id="q-tag" class="tag">UNDERSTANDING</div>
            <p id="q-text" style="font-size:1.05rem; font-weight:bold; margin:10px 0; text-align:left;"></p>
            <div id="options-grid"></div>
            <div id="feedback" style="display:none; padding:12px; border-radius:12px; margin-top:15px; font-size:0.9rem; font-weight:600;"></div>
            <button id="next-q-btn" class="btn" style="display:none;" onclick="loadQuestion()">CONTINUE ➔</button>
        </div>
    </div>
</div>

<script>
    // PATH TO YOUR FOLDER
    const imgPath = "G 8/Force and Pressure/";

    const factData = [
        {txt: "Force is a Push or Pull. Balanced forces (equal on both sides) result in zero motion!", img: "pressure_area.png"},
        {txt: "Pressure = Force / Area. Small points (like nails) concentrate force for HUGE pressure!", img: "pressure_area.png"}, // Can reuse or use specific name
        {txt: "Liquid Pressure increases with depth. The deeper you go, the higher the pressure!", img: "liquid_depth.png"},
        {txt: "Atmospheric Pressure is the weight of the air column above us pressing down!", img: "air_pressure.png"}
    ];

    const quizBank = {
        understand: [{q: "STORY: A student pushes a heavy box with 50N of force, but it stays perfectly still. Why?", opts: ["Force doesn't exist without motion", "The force is balanced by friction", "The box has no mass"], ans: 1, why: "Friction pushes back equally!"}],
        apply: [
            {q: "STORY: A chef finds a blunt knife won't slice a tomato, but a sharp one does easily. Why?", opts: ["Sharp knives have more energy", "Small edge area creates high pressure", "Blunt knives are too light"], ans: 1, why: "Tiny area = Massive Pressure!"},
            {q: "STORY: A porter puts a cloth ring on his head before lifting a heavy load. Why?", opts: ["To stay clean", "To increase contact area and lower pressure", "To balance better"], ans: 1, why: "More area spreads the weight!"}
        ],
        critical: [
            {q: "STORY: Why are submarine hulls at the bottom made much thicker than the top plates?", opts: ["To prevent flipping", "Water pressure is highest at the bottom", "To hide from fish"], ans: 1, why: "Pressure increases with depth!"},
            {q: "STORY: A bag of chips taken to a high mountain peak puffs up like a balloon. Why?", opts: ["The air inside got hot", "External air pressure is lower at high altitude", "Gravity pulled it"], ans: 1, why: "Lower outside pressure lets inside air expand!"}
        ]
    };

    let fIdx = 0;
    let qIdx = 0;
    let health = 3;
    let session = [];

    function showNextFact() {
        if(fIdx < factData.length) {
            document.getElementById('step-text').innerText = factData[fIdx].txt;
            // Combines folder path + image name
            document.getElementById('step-img').src = imgPath + factData[fIdx].img;
            fIdx++;
            if(fIdx === factData.length) document.getElementById('next-fact-btn').innerText = "Begin Mission! 🚀";
        } else {
            startQuiz();
        }
    }

    function startQuiz() {
        session = [quizBank.understand[0], ...quizBank.apply, ...quizBank.critical];
        document.getElementById('intro-ui').style.display = 'none';
        document.getElementById('quiz-ui').style.display = 'block';
        loadQuestion();
    }

    function loadQuestion() {
        if(qIdx >= session.length) { endGame(true); return; }
        const data = session[qIdx];
        document.getElementById('q-idx').innerText = `Progress: ${qIdx+1}/5`;
        document.getElementById('q-tag').innerText = qIdx === 0 ? "UNDERSTANDING" : (qIdx < 3 ? "APPLICATION" : "CRITICAL THINKING");
        document.getElementById('q-text').innerText = data.q;
        document.getElementById('feedback').style.display = 'none';
        document.getElementById('next-q-btn').style.display = 'none';
        
        const grid = document.getElementById('options-grid');
        grid.innerHTML = '';
        data.opts.forEach((o, i) => {
            const b = document.createElement('button');
            b.className = 'opt';
            b.innerText = o;
            b.onclick = () => {
                document.querySelectorAll('.opt').forEach(btn => btn.disabled = true);
                const fb = document.getElementById('feedback');
                fb.style.display = 'block';
                if(i === data.ans) {
                    fb.innerHTML = "✅ CORRECT! " + data.why;
                    fb.style.background = "#d4edda"; fb.style.color = "#155724";
                } else {
                    health--;
                    document.getElementById('lives').innerText = "LIVES: " + "❤️".repeat(health);
                    fb.innerHTML = "❌ OOPS! " + data.why;
                    fb.style.background = "#f8d7da"; fb.style.color = "#721c24";
                    if(health <= 0) { endGame(false); return; }
                }
                document.getElementById('next-q-btn').style.display = 'inline-block';
                qIdx++;
            };
            grid.appendChild(b);
        });
    }

    function endGame(win) {
        document.getElementById('quiz-ui').innerHTML = `
            <div class="bubble">
                <h2>${win ? '🏆 MISSION CLEAR' : '💀 SYSTEM FAIL'}</h2>
                <p>${win ? 'You mastered Force & Pressure!' : 'You ran out of lives.'}</p>
                <button class="btn" onclick="location.reload()">RETRY</button>
            </div>`;
    }

    showNextFact();
</script>
</body>
</html>
